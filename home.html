<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OrabyMKB · Smart File Hub</title>
    <meta name="description" content="OrabyMKB is the smart platform to upload, share, and discover files with your community.">
    <meta name="theme-color" content="#6c47ff">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
            --radius-xl: 1rem; --radius-2xl: 1.5rem; --radius-full: 9999px;
        }
        .theme-light {
            --bg-main: #f4f2ee; --bg-surface: #ffffff; --bg-hover: #f9fafb;
            --bg-input: #eef3f8; --border: #e5e7eb; --border-light: #f0f0f0;
            --text-primary: #191919; --text-secondary: #595856; --text-tertiary: #868482;
            --primary: #6c47ff; --primary-hover: #5835e8; --primary-light: #f0ebff;
            --secondary: #3b82f6; --secondary-hover: #2563eb; --secondary-light: #eff6ff;
            --success: #057642; --success-bg: #e9f7ef; --warning: #b85c00;
            --danger: #d11124; --danger-bg: #fdecea;
            --card-shadow: 0 0 0 1px rgba(0,0,0,0.05); --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.06);
        }
        .theme-dark {
            --bg-main: #1a1a2e; --bg-surface: #16213e; --bg-hover: #1a2744;
            --bg-input: #0f3460; --border: #2a3a5e; --border-light: #1e2d4a;
            --text-primary: #e8e8e8; --text-secondary: #b0b0b0; --text-tertiary: #8a8a8a;
            --primary: #8b6cff; --primary-hover: #7b5ce8; --primary-light: #1e1a3a;
            --secondary: #60a5fa; --secondary-hover: #3b82f6; --secondary-light: #1a2a4a;
            --success: #22c55e; --success-bg: #0a2a1a; --warning: #f59e0b;
            --danger: #ef4444; --danger-bg: #2a0a0a;
            --card-shadow: 0 0 0 1px rgba(255,255,255,0.05); --card-hover-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-size:16px;scroll-behavior:smooth}
        body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);line-height:1.5;min-height:100vh;transition:background var(--transition-base),color var(--transition-base)}
        a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:inherit;border:none;background:transparent}button:focus-visible{outline:2px solid var(--primary);outline-offset:2px}input,textarea,select{font-family:inherit;font-size:inherit}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

        @keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}@keyframes toastUp{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}@keyframes logoShine{0%{transform:translateX(-100%)translateY(-100%)}100%{transform:translateX(100%)translateY(100%)}}
        .loading-spinner{display:flex;align-items:center;justify-content:center;padding:3rem}.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.6s linear infinite}

        .navbar{position:sticky;top:0;z-index:100;background:var(--bg-surface);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 1.25rem;box-shadow:0 0 0 1px rgba(0,0,0,0.04)}
        .navbar-inner{max-width:1128px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:0.75rem}
        .navbar-brand{display:flex;align-items:center;gap:0.6rem;flex-shrink:0;cursor:pointer}
        .navbar-logo{
            width:38px;height:38px;border-radius:var(--radius-md);
            background:linear-gradient(135deg,#6c47ff,#00c6ff);
            display:flex;align-items:center;justify-content:center;
            color:white;font-weight:800;font-size:1rem;
            box-shadow:0 4px 14px rgba(108,71,255,0.35);
            position:relative;overflow:hidden;
        }
        .navbar-logo::after{
            content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
            background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.2) 50%,transparent 60%);
            animation:logoShine 3s ease-in-out infinite;
        }
        .navbar-logo span{position:relative;z-index:1}
        .navbar-title{
            font-size:1.1rem;font-weight:800;letter-spacing:-0.5px;
            background:linear-gradient(135deg,#6c47ff,#00c6ff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .navbar-search{flex:1;max-width:320px}
        .search-input-wrap{display:flex;align-items:center;background:var(--bg-input);border-radius:var(--radius-full);padding:0 0.8rem;height:36px;gap:0.5rem;transition:all var(--transition-fast);border:1.5px solid transparent}
        .search-input-wrap:focus-within{background:var(--bg-surface);border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,71,255,0.12)}
        .search-input-wrap input{flex:1;border:none;background:transparent;outline:none;font-size:0.875rem;color:var(--text-primary)}
        .navbar-actions{display:flex;align-items:center;gap:0.3rem;flex-shrink:0}
        .file-count-badge{background:linear-gradient(135deg,#6c47ff,#00c6ff);color:#fff;font-size:0.65rem;font-weight:700;min-width:22px;height:22px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;padding:0 6px;box-shadow:0 2px 8px rgba(108,71,255,0.3)}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.25rem;padding:0.5rem 1rem;border-radius:var(--radius-full);font-weight:600;font-size:0.875rem;transition:all var(--transition-fast);white-space:nowrap;font-family:var(--font-family)}.btn:active{transform:scale(0.97)}
        .btn-primary{background:linear-gradient(135deg,#6c47ff,#5835e8);color:#fff;box-shadow:0 2px 8px rgba(108,71,255,0.3)}.btn-primary:hover{background:linear-gradient(135deg,#7b5ce8,#6c47ff);box-shadow:0 4px 16px rgba(108,71,255,0.4)}
        .btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);font-weight:600}.btn-outline:hover{background:var(--primary-light)}
        .btn-ghost{background:transparent;color:var(--text-secondary);font-weight:500}.btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary)}
        .btn-sm{padding:0.35rem 0.8rem;font-size:0.8125rem}.btn-xs{padding:0.2rem 0.5rem;font-size:0.7rem;border-radius:var(--radius-sm)}
        .btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center}
        .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}

        .main-layout{display:grid;grid-template-columns:1fr 300px;gap:1rem;padding:1rem;padding-bottom:3rem;max-width:1128px;margin:0 auto}
        .feed-column{min-width:0}.sidebar-column{position:sticky;top:70px;align-self:start;display:flex;flex-direction:column;gap:0.75rem}

        .upload-box{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.15rem;box-shadow:var(--card-shadow);margin-bottom:1rem}
        .upload-trigger{display:flex;align-items:center;gap:0.75rem;padding:0.8rem 1.15rem;background:var(--bg-input);border:2px dashed var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all var(--transition-fast);margin-bottom:0.75rem}
        .upload-trigger:hover,.upload-trigger.drag-active{background:var(--primary-light);border-color:var(--primary)}.upload-trigger.drag-active{animation:pulse 2s infinite;border-style:solid}
        .upload-trigger i{font-size:24px;color:var(--primary);flex-shrink:0}.upload-trigger-text{flex:1;font-size:0.875rem;color:var(--text-tertiary);font-weight:500}
        .upload-subject-row{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap}
        .subject-input{flex:1;min-width:150px;padding:0.55rem 0.8rem;border:1.5px solid var(--border);border-radius:var(--radius-full);font-size:0.85rem;background:var(--bg-surface);color:var(--text-primary);outline:none;transition:all var(--transition-fast)}.subject-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,71,255,0.1)}
        #fileInput{display:none}

        .progress-card{background:var(--bg-surface);border:1.5px solid var(--primary);border-radius:var(--radius-lg);padding:1rem;box-shadow:var(--card-shadow);display:none;animation:slideDown 0.3s ease;margin-top:0.75rem}.progress-card.active{display:block}
        .progress-header{display:flex;justify-content:space-between;margin-bottom:0.5rem;font-size:0.8125rem;font-weight:600}
        .progress-bar-wrapper{width:100%;height:6px;background:var(--bg-input);border-radius:var(--radius-full);overflow:hidden;margin-bottom:4px}
        .progress-bar-fill{height:100%;background:linear-gradient(135deg,#6c47ff,#00c6ff);border-radius:var(--radius-full);width:0%;transition:width 0.4s ease}
        .progress-detail{font-size:0.7rem;color:var(--text-tertiary);text-align:right}

        .view-tabs{display:flex;gap:2px;background:var(--border);border-radius:var(--radius-full);overflow:hidden;margin-bottom:1rem;padding:3px}
        .tab-btn{flex:1;padding:0.55rem;background:transparent;font-size:0.8125rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:0.3rem;border-radius:var(--radius-full)}.tab-btn:hover{color:var(--text-primary)}.tab-btn.active{background:var(--surface);color:var(--primary);box-shadow:var(--card-shadow)}

        .file-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.1rem;margin-bottom:0.75rem;box-shadow:var(--card-shadow);transition:all var(--transition-fast);animation:fadeIn 0.25s ease-out;cursor:pointer}.file-card:hover{box-shadow:var(--card-hover-shadow);border-color:var(--primary);transform:translateY(-1px)}
        .card-header{display:flex;align-items:flex-start;gap:0.85rem;margin-bottom:0.6rem}
        .card-icon{width:46px;height:46px;border-radius:var(--radius-md);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
        .card-icon.pdf{background:linear-gradient(135deg,#ffebee,#ffcdd2);color:#c62828}.card-icon.word{background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:#0d47a1}.card-icon.excel{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#1b5e20}.card-icon.ppt{background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#e65100}.card-icon.txt{background:linear-gradient(135deg,#fafafa,#e0e0e0);color:#424242}.card-icon.image{background:linear-gradient(135deg,#ede7f6,#d1c4e9);color:#311b92}.card-icon.video{background:linear-gradient(135deg,#fce4ec,#f8bbd0);color:#880e4f}.card-icon.other{background:linear-gradient(135deg,#eceff1,#cfd8dc);color:#37474f}
        .card-meta{flex:1;min-width:0}.card-title{font-size:0.95rem;font-weight:700;margin-bottom:0.2rem;line-height:1.4;word-break:break-word}.card-title:hover{color:var(--primary)}
        .card-subtitle{font-size:0.75rem;color:var(--text-tertiary);display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap}
        .card-subject-tag{display:inline-block;padding:2px 10px;border-radius:var(--radius-full);font-size:0.7rem;font-weight:600;background:var(--primary-light);color:var(--primary);margin-top:0.3rem}
        .card-actions{display:flex;align-items:center;gap:0.2rem;padding-top:0.6rem;border-top:1px solid var(--border-light);flex-wrap:wrap}
        .card-action-btn{display:flex;align-items:center;gap:0.2rem;padding:0.35rem 0.65rem;border-radius:var(--radius-sm);font-size:0.75rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast)}.card-action-btn:hover{background:var(--bg-hover);color:var(--text-primary)}.card-action-btn.danger:hover{background:var(--danger-bg);color:var(--danger)}.card-action-btn i{font-size:1.15rem}

        .grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:0.85rem}
        .grid-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.25rem 0.85rem;box-shadow:var(--card-shadow);transition:all var(--transition-fast);cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0.6rem;animation:fadeIn 0.25s ease-out}.grid-card:hover{box-shadow:var(--card-hover-shadow);transform:translateY(-3px);border-color:var(--primary)}
        .grid-icon{width:52px;height:52px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:28px}
        .grid-icon.pdf{background:linear-gradient(135deg,#ffebee,#ffcdd2);color:#c62828}.grid-icon.word{background:linear-gradient(135deg,#e3f2fd,#bbdefb);color:#0d47a1}.grid-icon.excel{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#1b5e20}.grid-icon.ppt{background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#e65100}.grid-icon.txt{background:linear-gradient(135deg,#fafafa,#e0e0e0);color:#424242}.grid-icon.image{background:linear-gradient(135deg,#ede7f6,#d1c4e9);color:#311b92}.grid-icon.video{background:linear-gradient(135deg,#fce4ec,#f8bbd0);color:#880e4f}.grid-icon.other{background:linear-gradient(135deg,#eceff1,#cfd8dc);color:#37474f}
        .grid-name{font-weight:600;font-size:0.82rem;color:var(--text-primary);word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;width:100%}.grid-meta{font-size:0.68rem;color:var(--text-tertiary)}.grid-actions{display:flex;gap:4px;margin-top:0.2rem}
        .btn-sm-icon{width:29px;height:29px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.95rem;transition:all var(--transition-fast)}.btn-sm-icon:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}.btn-sm-icon.danger:hover{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}

        .table-view{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--card-shadow);overflow:hidden;animation:fadeIn 0.25s ease-out}.table-scroll{overflow-x:auto}
        .file-table{width:100%;border-collapse:collapse;min-width:620px}.file-table thead{background:var(--bg-hover);border-bottom:2px solid var(--border)}
        .file-table th{padding:11px 14px;text-align:left;font-size:0.7rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;cursor:pointer;user-select:none;transition:all var(--transition-fast)}.file-table th:hover{color:var(--primary);background:var(--primary-light)}.file-table th i{font-size:0.7rem;margin-left:4px;opacity:0.5}.file-table th.sorted i{opacity:1;color:var(--primary)}
        .file-table td{padding:9px 14px;border-bottom:1px solid var(--border-light);font-size:0.8rem}.file-table tbody tr{transition:all var(--transition-fast);cursor:pointer}.file-table tbody tr:hover{background:var(--bg-hover)}
        .file-cell{display:flex;align-items:center;gap:9px}.table-file-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
        .table-file-icon.pdf{background:#ffebee;color:#c62828}.table-file-icon.word{background:#e3f2fd;color:#0d47a1}.table-file-icon.excel{background:#e8f5e9;color:#1b5e20}.table-file-icon.ppt{background:#fff3e0;color:#e65100}.table-file-icon.txt{background:#fafafa;color:#424242}.table-file-icon.image{background:#ede7f6;color:#311b92}.table-file-icon.video{background:#fce4ec;color:#880e4f}.table-file-icon.other{background:#eceff1;color:#37474f}
        .actions-cell{display:flex;gap:4px}

        .sidebar-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.15rem;box-shadow:var(--card-shadow)}.sidebar-card-title{font-size:0.875rem;font-weight:700;margin-bottom:0.85rem;display:flex;align-items:center;gap:0.5rem}
        .sidebar-mini-link{display:flex;align-items:center;gap:0.55rem;padding:0.55rem;font-size:0.75rem;cursor:pointer;border-radius:var(--radius-sm);transition:all var(--transition-fast)}.sidebar-mini-link:hover{background:var(--bg-hover)}
        .sidebar-mini-link-num{font-weight:700;color:var(--primary);min-width:20px;font-size:0.75rem}.sidebar-mini-link-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary);font-weight:500}
        .sidebar-mini-icon{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
        .sidebar-mini-icon.pdf{background:#ffebee;color:#c62828}.sidebar-mini-icon.word{background:#e3f2fd;color:#0d47a1}.sidebar-mini-icon.excel{background:#e8f5e9;color:#1b5e20}.sidebar-mini-icon.ppt{background:#fff3e0;color:#e65100}.sidebar-mini-icon.txt{background:#fafafa;color:#424242}.sidebar-mini-icon.image{background:#ede7f6;color:#311b92}.sidebar-mini-icon.video{background:#fce4ec;color:#880e4f}.sidebar-mini-icon.other{background:#eceff1;color:#37474f}

        .empty-state{text-align:center;padding:3rem 1rem;background:var(--bg-surface);border-radius:var(--radius-xl);border:1px solid var(--border)}.empty-state i{font-size:52px;color:var(--border);margin-bottom:0.75rem;display:block}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:all var(--transition-base)}.modal-overlay.active{opacity:1;visibility:visible}
        .modal{background:var(--bg-surface);border-radius:var(--radius-xl);width:100%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.2);animation:modalIn .25s ease-out}
        .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.15rem 1.35rem;border-bottom:1px solid var(--border-light);position:sticky;top:0;background:var(--bg-surface);z-index:5}.modal-title{font-weight:700;font-size:1.1rem}
        .modal-close{width:38px;height:38px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-tertiary);font-size:1.3rem;transition:all var(--transition-fast)}.modal-close:hover{background:var(--bg-hover)}.modal-body{padding:1.35rem}

        .toast-container{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:0.5rem;width:92%;max-width:420px;pointer-events:none}
        .toast{padding:0.8rem 1.1rem;border-radius:var(--radius-md);font-size:0.8125rem;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,0.2);animation:toastUp .35s ease-out;display:flex;align-items:center;gap:0.5rem;pointer-events:auto}.toast.success{background:var(--success-bg);color:var(--success);border:1px solid #a7f3d0}.toast.error{background:var(--danger-bg);color:var(--danger);border:1px solid #fecaca}.toast.info{background:var(--secondary-light);color:#1e40af;border:1px solid #bfdbfe}

        @media(max-width:900px){.main-layout{grid-template-columns:1fr;padding:0.85rem}.sidebar-column{display:none}.navbar-title{display:none}.navbar-search{max-width:200px}}
        @media(max-width:600px){.navbar{padding:0 0.6rem;height:50px}.navbar-search{max-width:140px}.navbar-logo{width:30px;height:30px;font-size:0.8rem}.upload-trigger{padding:0.65rem 0.85rem;gap:0.5rem}.upload-trigger i{font-size:20px}.upload-trigger-text{font-size:0.75rem}.upload-subject-row{flex-direction:column}.subject-input{width:100%}.card-header{gap:0.55rem}.card-icon{width:38px;height:38px;font-size:20px}.card-title{font-size:0.85rem}.card-action-btn span{display:none}.card-action-btn{padding:0.4rem 0.55rem}.grid-view{grid-template-columns:repeat(2,1fr);gap:0.55rem}.tab-btn span{display:none}.tab-btn{padding:0.55rem 0.4rem;font-size:0.72rem}.file-table th,.file-table td{padding:7px 9px;font-size:0.72rem}.btn-sm-icon{width:26px;height:26px;font-size:0.85rem}.modal{max-width:95vw;margin:0.5rem}}
        @media(max-width:380px){.navbar-search{max-width:110px}.search-input-wrap input{font-size:0.75rem}.btn{font-size:0.75rem;padding:0.4rem 0.75rem}.grid-view{grid-template-columns:repeat(2,1fr);gap:0.4rem}.grid-card{padding:0.85rem 0.55rem}.grid-icon{width:40px;height:40px;font-size:22px}.grid-name{font-size:0.72rem}}
    </style>
</head>
<body class="theme-light">
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="navbar-brand" onclick="resetToFeed()">
                <div class="navbar-logo"><span>OM</span></div>
                <span class="navbar-title">OrabyMKB</span>
            </div>

    <script>
        (function() {
            const SUPABASE_URL = "https://kdrgdnrwibuqpvikjapx.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkcmdkbnJ3aWJ1cXB2aWtqYXB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjE4ODMsImV4cCI6MjA5NjkzNzg4M30.9wEbcIDziq9xDWZQ_BF0X-p25g4SQkuCCQV-5fhDnbY";
            const STORAGE_BUCKET = "exams";
            
            let supabase;
            try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false, autoRefreshToken: false }, global: { headers: { 'X-Client-Info': 'orabymkb' } } }); } catch(e) { console.error('Supabase init:', e); }
            
            const $ = (id) => document.getElementById(id);
            const dropZone = $('dropZone'), fileInput = $('fileInput'), browseBtn = $('browseBtn'), subjectInput = $('subjectInput');
            const progressCard = $('progressCard'), progressFill = $('progressFill'), progressLabel = $('progressLabel'), progressPercent = $('progressPercent'), progressDetail = $('progressDetail');
            const searchInput = $('searchInput'), refreshBtn = $('refreshBtn'), feedView = $('feedView'), gridView = $('gridView'), tableView = $('tableView'), tableBody = $('tableBody'), emptyState = $('emptyState');
            const navFileCount = $('navFileCount'), recentMini = $('recentMini'), toastContainer = $('toastContainer');
            const subjectModal = $('subjectModal'), subjectFileName = $('subjectFileName'), modalSubjectInput = $('modalSubjectInput'), confirmSubjectBtn = $('confirmSubject'), subjectModalClose = $('subjectModalClose');
            
            let allFiles = [], fileSubjects = {}, filteredFiles = [], currentView = 'feed', tableSort = { field: 'name', direction: 'asc' }, searchTimeout, pendingFiles = null;
            try { fileSubjects = JSON.parse(localStorage.getItem('orabymkb_subjects') || '{}'); } catch(e) { fileSubjects = {}; }
            function saveSubjects() { localStorage.setItem('orabymkb_subjects', JSON.stringify(fileSubjects)); }
            
            function showToast(m, t) { const d = document.createElement('div'); d.className = 'toast ' + (t||'success'); d.innerHTML = '<span>'+m+'</span>'; toastContainer.appendChild(d); setTimeout(() => { d.style.opacity='0'; d.style.transform='translateY(10px)'; d.style.transition='all 0.25s'; setTimeout(() => d.remove(), 250); }, 3000); }
            function formatSize(b) { if(!b||b===0) return '0 B'; const k=1024,s=['B','KB','MB','GB']; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]; }
            function getExt(fn){return(fn||'').split('.').pop().toLowerCase()}
            function typeLabel(fn){const e=getExt(fn);const t={'pdf':'PDF','doc':'Word','docx':'Word','xls':'Excel','xlsx':'Excel','ppt':'PowerPoint','pptx':'PowerPoint','txt':'Text','csv':'CSV','md':'Markdown','rtf':'Rich Text','json':'JSON','xml':'XML','jpg':'JPEG','jpeg':'JPEG','png':'PNG','gif':'GIF','svg':'SVG','webp':'WebP','mp4':'MP4','mkv':'MKV','webm':'WebM','mp3':'MP3','wav':'WAV','ogg':'OGG','zip':'ZIP','rar':'RAR'};return t[e]||e.toUpperCase()+' File'}
            function getCategory(fn){const e=getExt(fn);const d=['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','md','rtf','odt','ods','odp','json','xml'];const im=['jpg','jpeg','png','gif','svg','webp','bmp','ico','heic','heif','tiff'];const v=['mp4','avi','mov','wmv','flv','mkv','webm','m4v','3gp'];const a=['mp3','wav','ogg','aac','flac','m4a'];if(d.includes(e))return e;if(im.includes(e))return'image';if(v.includes(e))return'video';if(a.includes(e))return'audio';return'other'}
            function getIcon(fn){const c=getCategory(fn);const m={'pdf':'bx bxs-file-pdf','doc':'bx bxs-file-doc','docx':'bx bxs-file-doc','xls':'bx bx-spreadsheet','xlsx':'bx bx-spreadsheet','ppt':'bx bxs-slideshow','pptx':'bx bxs-slideshow','txt':'bx bx-text','csv':'bx bx-spreadsheet','md':'bx bx-text','rtf':'bx bx-text','json':'bx bx-code','xml':'bx bx-code','image':'bx bx-image-alt','video':'bx bx-video','audio':'bx bx-music'};return m[c]||'bx bx-file-blank'}
            function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
            function formatDate(d){if(!d)return'Unknown';const dt=new Date(d),n=new Date(),ms=n-dt,m=Math.floor(ms/60000);if(m<1)return'Just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';const dy=Math.floor(h/24);if(dy<7)return dy+'d ago';return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
            function formatFullDate(d){if(!d)return'Unknown';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}
            function sanitize(n){return n.replace(/[^a-zA-Z0-9._-]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')}
            function getPublicUrl(fn){if(!supabase)return'';const{data}=supabase.storage.from(STORAGE_BUCKET).getPublicUrl(fn);return data?.publicUrl||''}
            
            async function fetchFiles(){if(!supabase)return;try{const{data,error}=await supabase.storage.from(STORAGE_BUCKET).list('',{limit:200,offset:0,sortBy:{column:'created_at',order:'desc'}});if(error)throw error;allFiles=(data||[]).filter(f=>f&&f.name&&!f.name.endsWith('/'));applyFilters()}catch(err){console.error(err);allFiles=[];applyFilters()}}
            function updateStats(){navFileCount.textContent=allFiles.length}
            
            async function copyFileUrl(fn){try{await navigator.clipboard.writeText(getPublicUrl(fn));showToast('Link copied!','success')}catch(e){const t=document.createElement('textarea');t.value=getPublicUrl(fn);document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('Link copied!','success')}}
            function openFilePreview(fn){const url=getPublicUrl(fn);const s=fileSubjects[fn]||'';window.location.href='view.html?'+new URLSearchParams({file:fn,url:url,subject:s}).toString()}
            async function deleteFile(fn){if(!supabase||!confirm('Delete "'+fn+'"? This cannot be undone.'))return;try{const{error}=await supabase.storage.from(STORAGE_BUCKET).remove([fn]);if(error)throw error;delete fileSubjects[fn];saveSubjects();showToast('Deleted '+fn,'success');await fetchFiles()}catch(e){showToast('Delete failed: '+e.message,'error')}}
            
            function openSubjectModal(files){pendingFiles=files;subjectFileName.textContent=files.length===1?files[0].name:files.length+' files';modalSubjectInput.value=subjectInput.value||'';modalSubjectInput.focus();subjectModal.classList.add('active')}
            function closeSubjectModal(){subjectModal.classList.remove('active');pendingFiles=null}
            function confirmSubject(){const s=modalSubjectInput.value.trim();subjectInput.value=s;if(pendingFiles){for(const f of pendingFiles){if(s)fileSubjects[f.name]=s}saveSubjects();processUploadQueue(pendingFiles)}closeSubjectModal()}
            
            async function uploadSingleFile(file){if(!supabase)throw new Error('Not initialized');const sn=sanitize(file.name);if(!sn)throw new Error('Invalid name');const att=[{name:file.name,upsert:false},{name:sn,upsert:false},{name:Date.now()+'_'+sn,upsert:false}];for(const a of att){try{const{data,error}=await supabase.storage.from(STORAGE_BUCKET).upload(a.name,file,{cacheControl:'3600',upsert:a.upsert});if(!error)return data;if(error.message?.includes('already exists')||error.statusCode==='409')continue;throw error}catch(e){if(a===att[att.length-1])throw e}}throw new Error('All attempts failed')}
            async function processUploadQueue(files){if(!files||files.length===0)return;progressCard.classList.add('active');progressFill.style.width='0%';progressPercent.textContent='0%';progressLabel.textContent='Starting...';progressDetail.textContent='0 / '+files.length+' files';let ok=0,fail=0;const t=files.length;for(let i=0;i<t;i++){const f=files[i];try{progressLabel.textContent='Uploading: '+f.name;await uploadSingleFile(f);ok++}catch(e){fail++;showToast(f.name+': '+e.message,'error')}const p=((i+1)/t)*100;progressFill.style.width=p+'%';progressPercent.textContent=Math.round(p)+'%';progressDetail.textContent=(i+1)+' / '+t+' files'}progressLabel.textContent='Done!';progressFill.style.width='100%';progressPercent.textContent='100%';progressDetail.textContent=ok+' ok, '+fail+' failed';if(ok>0)showToast(ok+' file(s) uploaded!','success');setTimeout(()=>{progressCard.classList.remove('active');progressFill.style.width='0%'},2500);await fetchFiles()}
            function handleFiles(files){if(!files||files.length===0)return;openSubjectModal(Array.from(files))}
            
            function applyFilters(){const s=(searchInput.value||'').trim().toLowerCase();if(s){filteredFiles=allFiles.filter(f=>(f.name||'').toLowerCase().includes(s)||(fileSubjects[f.name]||'').toLowerCase().includes(s)||typeLabel(f.name).toLowerCase().includes(s))}else{filteredFiles=[...allFiles]}filteredFiles.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));if(currentView==='table')sortTableFiles();updateStats();renderCurrentView();renderRecentMini()}
            function sortTableFiles(){filteredFiles.sort((a,b)=>{let c=0;switch(tableSort.field){case'name':c=(a.name||'').localeCompare(b.name||'');break;case'type':c=typeLabel(a.name).localeCompare(typeLabel(b.name));break;case'size':c=(a.metadata?.size||0)-(b.metadata?.size||0);break;case'date':c=new Date(a.created_at||0)-new Date(b.created_at||0);break}return tableSort.direction==='asc'?c:-c})}
            
            function renderCurrentView(){const h=filteredFiles.length>0;emptyState.style.display=h?'none':'block';switch(currentView){case'feed':renderFeedView();break;case'grid':renderGridView();break;case'table':renderTableView();break}}
            
            function renderFeedView(){feedView.style.display='block';gridView.style.display='none';tableView.style.display='none';if(filteredFiles.length===0){feedView.innerHTML='';return}
            feedView.innerHTML=filteredFiles.map((f,i)=>{const fn=f.name||'?',sz=f.metadata?.size||0,d=formatFullDate(f.created_at),cat=getCategory(fn),ic=getIcon(fn),sn=esc(fn),sj=fileSubjects[fn]||'',tl=typeLabel(fn),ru=getPublicUrl(fn);return'<div class="file-card" style="animation-delay:'+Math.min(i*0.03,0.5)+'s" onclick="window.OrabyMKB.openPreview(\''+sn+'\')"><div class="card-header"><div class="card-icon '+cat+'"><i class="'+ic+'"></i></div><div class="card-meta"><div class="card-title">'+sn+'</div><div class="card-subtitle"><span>'+tl+'</span><span>·</span><span>'+formatSize(sz)+'</span><span>·</span><span>'+d+'</span></div>'+(sj?'<span class="card-subject-tag">'+esc(sj)+'</span>':'')+'</div></div><div class="card-actions" onclick="event.stopPropagation();"><button class="card-action-btn" onclick="window.OrabyMKB.copyUrl(\''+sn+'\')"><i class="bx bx-link"></i> <span>Copy</span></button><button class="card-action-btn" onclick="window.OrabyMKB.openPreview(\''+sn+'\')"><i class="bx bx-show"></i> <span>View</span></button><button class="card-action-btn" onclick="window.open(\''+esc(ru)+'\',\'_blank\')"><i class="bx bx-open-in-new"></i> <span>Raw</span></button><button class="card-action-btn danger" onclick="window.OrabyMKB.deleteFile(\''+sn+'\')"><i class="bx bx-trash"></i> <span>Delete</span></button></div></div>'}).join('')}
            
            function renderGridView(){feedView.style.display='none';gridView.style.display='grid';tableView.style.display='none';if(filteredFiles.length===0){gridView.innerHTML='';return}
            gridView.innerHTML=filteredFiles.map(f=>{const fn=f.name||'?',sz=f.metadata?.size||0,d=formatDate(f.created_at),cat=getCategory(fn),ic=getIcon(fn),sn=esc(fn),sj=fileSubjects[fn]||'',ru=getPublicUrl(fn);return'<div class="grid-card" ondblclick="window.OrabyMKB.openPreview(\''+sn+'\')" title="Double-click to preview"><div class="grid-icon '+cat+'"><i class="'+ic+'"></i></div><div class="grid-name">'+sn+'</div>'+(sj?'<span class="card-subject-tag">'+esc(sj)+'</span>':'')+'<div class="grid-meta">'+formatSize(sz)+' · '+d+'</div><div class="grid-actions"><button class="btn-sm-icon" onclick="event.stopPropagation();window.OrabyMKB.copyUrl(\''+sn+'\')"><i class="bx bx-link"></i></button><button class="btn-sm-icon" onclick="event.stopPropagation();window.OrabyMKB.openPreview(\''+sn+'\')"><i class="bx bx-show"></i></button><button class="btn-sm-icon" onclick="event.stopPropagation();window.open(\''+esc(ru)+'\',\'_blank\')"><i class="bx bx-open-in-new"></i></button><button class="btn-sm-icon danger" onclick="event.stopPropagation();window.OrabyMKB.deleteFile(\''+sn+'\')"><i class="bx bx-trash"></i></button></div></div>'}).join('')}
            
            function renderTableView(){feedView.style.display='none';gridView.style.display='none';tableView.style.display='block';if(filteredFiles.length===0){tableBody.innerHTML='';return}
            document.querySelectorAll('.file-table th[data-sort]').forEach(th=>{th.classList.remove('sorted');const i=th.querySelector('i');if(i)i.className='bx bx-sort'});const sh=document.querySelector('.file-table th[data-sort="'+tableSort.field+'"]');if(sh){sh.classList.add('sorted');const i=sh.querySelector('i');if(i)i.className=tableSort.direction==='asc'?'bx bx-sort-up':'bx bx-sort-down'}
            tableBody.innerHTML=filteredFiles.map(f=>{const fn=f.name||'?',sz=f.metadata?.size||0,d=formatFullDate(f.created_at),cat=getCategory(fn),ic=getIcon(fn),sn=esc(fn),tl=typeLabel(fn),ru=getPublicUrl(fn);return'<tr onclick="window.OrabyMKB.openPreview(\''+sn+'\')"><td><div class="file-cell"><div class="table-file-icon '+cat+'"><i class="'+ic+'"></i></div><span title="'+sn+'" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;">'+sn+'</span></div></td><td>'+tl+'</td><td>'+formatSize(sz)+'</td><td>'+d+'</td><td><div class="actions-cell" onclick="event.stopPropagation();"><button class="btn-sm-icon" onclick="window.OrabyMKB.copyUrl(\''+sn+'\')"><i class="bx bx-link"></i></button><button class="btn-sm-icon" onclick="window.OrabyMKB.openPreview(\''+sn+'\')"><i class="bx bx-show"></i></button><button class="btn-sm-icon" onclick="window.open(\''+esc(ru)+'\',\'_blank\')"><i class="bx bx-open-in-new"></i></button><button class="btn-sm-icon danger" onclick="window.OrabyMKB.deleteFile(\''+sn+'\')"><i class="bx bx-trash"></i></button></div></td></tr>'}).join('')}
            
            function renderRecentMini(){const rf=allFiles.slice(0,5);if(rf.length===0){recentMini.innerHTML='<p style="color:var(--text-tertiary);font-size:0.75rem;text-align:center;padding:1rem;">No files yet</p>';return}
            recentMini.innerHTML=rf.map((f,i)=>{const fn=f.name||'?',d=formatDate(f.created_at),cat=getCategory(fn),ic=getIcon(fn),sn=esc(fn);return'<div class="sidebar-mini-link" onclick="window.OrabyMKB.openPreview(\''+sn+'\')" title="Click to preview"><span class="sidebar-mini-link-num">#'+(i+1)+'</span><div class="sidebar-mini-icon '+cat+'"><i class="'+ic+'"></i></div><span class="sidebar-mini-link-text">'+sn+'</span><span style="font-size:0.6rem;color:var(--text-tertiary);">'+d+'</span></div>'}).join('')}
            
            function switchView(v){currentView=v;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));applyFilters()}
            function resetToFeed(){currentView='feed';searchInput.value='';document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='feed'));applyFilters()}
            function setTheme(t){document.body.classList.remove('theme-light','theme-dark');document.body.classList.add('theme-'+t);$('themeIcon').className=t==='dark'?'bx bx-sun':'bx bx-moon';localStorage.setItem('orabymkb-theme',t)}
            
            ['dragenter','dragover','dragleave','drop'].forEach(ev=>{dropZone.addEventListener(ev,(e)=>{e.preventDefault();e.stopPropagation()})});
            dropZone.addEventListener('dragenter',()=>dropZone.classList.add('drag-active'));dropZone.addEventListener('dragover',()=>dropZone.classList.add('drag-active'));
            dropZone.addEventListener('dragleave',(e)=>{if(!dropZone.contains(e.relatedTarget))dropZone.classList.remove('drag-active')});
            dropZone.addEventListener('drop',(e)=>{dropZone.classList.remove('drag-active');const files=e.dataTransfer?.files;if(files&&files.length>0)handleFiles(files)});
            dropZone.addEventListener('click',()=>fileInput.click());browseBtn.addEventListener('click',(e)=>{e.stopPropagation();fileInput.click()});
            fileInput.addEventListener('change',(e)=>{if(fileInput.files&&fileInput.files.length>0){handleFiles(fileInput.files);fileInput.value=''}});
            $('viewTabs').addEventListener('click',(e)=>{const b=e.target.closest('.tab-btn');if(b)switchView(b.dataset.view)});
            searchInput.addEventListener('input',()=>{clearTimeout(searchTimeout);searchTimeout=setTimeout(applyFilters,300)});
            refreshBtn.addEventListener('click',fetchFiles);
            $('themeToggle').addEventListener('click',()=>{const c=document.body.classList.contains('theme-dark')?'dark':'light';setTheme(c==='dark'?'light':'dark')});
            document.querySelector('.file-table thead').addEventListener('click',(e)=>{const th=e.target.closest('th[data-sort]');if(!th)return;const f=th.dataset.sort;if(tableSort.field===f){tableSort.direction=tableSort.direction==='asc'?'desc':'asc'}else{tableSort.field=f;tableSort.direction='asc'}applyFilters()});
            subjectModalClose.addEventListener('click',closeSubjectModal);subjectModal.addEventListener('click',(e)=>{if(e.target===subjectModal)closeSubjectModal()});
            confirmSubjectBtn.addEventListener('click',confirmSubject);modalSubjectInput.addEventListener('keypress',(e)=>{if(e.key==='Enter')confirmSubject()});
            
            document.addEventListener('keydown',(e)=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();searchInput.focus();searchInput.select()}if((e.ctrlKey||e.metaKey)&&e.key==='1'){e.preventDefault();switchView('feed')}if((e.ctrlKey||e.metaKey)&&e.key==='2'){e.preventDefault();switchView('grid')}if((e.ctrlKey||e.metaKey)&&e.key==='3'){e.preventDefault();switchView('table')}});
            
            window.OrabyMKB={copyUrl:copyFileUrl,deleteFile:deleteFile,openPreview:openFilePreview,refresh:fetchFiles};
            
            const savedTheme=localStorage.getItem('orabymkb-theme')||'light';setTheme(savedTheme);
            fetchFiles();setInterval(fetchFiles,30000);
        })();
    </script>
