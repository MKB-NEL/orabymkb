<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Access</title>
    <meta name="theme-color" content="#f4f2ee">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --bg: #f4f2ee;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #191919;
            --text-secondary: #595856;
            --text-tertiary: #868482;
            --primary: #6c47ff;
            --primary-hover: #5835e8;
            --success: #057642;
            --danger: #d11124;
            --game-bg: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font); background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased; user-select: none;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }

        .screen {
            width: 100%; max-width: 340px; display: flex;
            flex-direction: column; align-items: center; gap: 32px;
            animation: fadeIn 0.35s ease;
        }
        .screen.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)} }
        @keyframes pop { 0%{transform:scale(0.7)}60%{transform:scale(1.08)}100%{transform:scale(1)} }

        /* Input */
        .input-group {
            width: 100%; display: flex; flex-direction: column; gap: 6px;
        }
        .input-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-tertiary); text-align: center;
        }
        .text-input {
            width: 100%; padding: 14px 18px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: var(--text); font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease; text-align: center;
        }
        .text-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
        .text-input::placeholder { color: #b0b0b0; }

        .btn {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            font-weight: 600; font-size: 0.9rem; font-family: var(--font);
            cursor: pointer; transition: all 0.2s ease; background: var(--primary);
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        /* Question - centered */
        .question-box {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .q-hint {
            font-size: 0.62rem; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .q-text {
            font-size: 1.05rem; font-weight: 600; color: var(--text);
            text-align: center; line-height: 1.45; padding: 0 8px;
        }

        /* Answer dots - centered */
        .answer-dots { display: flex; gap: 10px; justify-content: center; }
        .answer-dot {
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #d1d5db; background: transparent;
            transition: all 0.2s ease;
        }
        .answer-dot.filled { border-color: var(--primary); background: var(--primary); animation: pop 0.2s ease; }
        .answer-dot.correct { border-color: var(--success); background: var(--success); box-shadow: 0 0 8px rgba(5,118,66,0.3); }
        .answer-dot.wrong { border-color: var(--danger); background: var(--danger); box-shadow: 0 0 8px rgba(209,17,36,0.3); animation: shake 0.4s ease; }

        /* Hidden input */
        .hidden-input { position: absolute; opacity: 0; height: 0; width: 0; pointer-events: none; }

        /* Number grid */
        .num-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%; background: var(--surface);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 14px;
        }
        .num-btn {
            aspect-ratio: 1; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 1.35rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font); -webkit-tap-highlight-color: transparent;
        }
        .num-btn:hover { background: #e8e6e0; border-color: #c0bfbc; }
        .num-btn:active { transform: scale(0.93); background: #ddd; }
        .num-btn.flash-ok { background: #e9f7ef !important; border-color: var(--success) !important; color: var(--success) !important; animation: pop 0.3s ease; }
        .num-btn.flash-no { background: #fdecea !important; border-color: var(--danger) !important; color: var(--danger) !important; animation: shake 0.3s ease; }
        .num-btn.placeholder { border: none; background: transparent; pointer-events: none; }
        .num-btn.del-btn { background: transparent; border-color: transparent; color: var(--text-tertiary); font-size: 1rem; }
        .num-btn.del-btn:hover { background: var(--bg); border-color: var(--border); color: var(--danger); }

        .action-row { display: flex; gap: 8px; width: 100%; }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text-tertiary); font-size: 0.68rem;
            font-weight: 600; cursor: pointer; font-family: var(--font);
            transition: all 0.2s ease; text-align: center;
        }
        .action-btn:hover { background: #f9fafb; color: var(--text-secondary); }

        .msg { font-size: 0.7rem; font-weight: 500; min-height: 16px; text-align: center; transition: all 0.3s ease; }
        .msg.red { color: var(--danger); }
        .msg.green { color: var(--success); }
        .msg.gray { color: var(--text-tertiary); }

        /* Game screen */
        .game-container {
            width: 100%; background: var(--game-bg); border-radius: 20px;
            padding: 20px 16px; display: flex; flex-direction: column;
            align-items: center; gap: 16px; color: #e0e0e0;
        }
        .game-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #888; }
        .game-target {
            font-size: 3rem; font-weight: 800; color: #fff;
            animation: pop 0.3s ease;
        }
        .game-score { font-size: 0.75rem; color: #aaa; }
        .game-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; width: 100%;
        }
        .game-btn {
            aspect-ratio: 1; border-radius: 12px; border: 1.5px solid #2a2a40;
            background: #111122; color: #ccc; font-size: 1.3rem; font-weight: 600;
            cursor: pointer; transition: all 0.12s ease; display: flex;
            align-items: center; justify-content: center; font-family: var(--font);
        }
        .game-btn:active { transform: scale(0.9); background: #1a1a30; }
        .game-btn.correct-pick { background: #0a2a10 !important; border-color: #22c55e !important; color: #22c55e !important; }
        .game-btn.wrong-pick { background: #2a0a0a !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        .game-msg { font-size: 0.7rem; color: #888; min-height: 16px; text-align: center; }

        .done-circle {
            width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--success);
            display: flex; align-items: center; justify-content: center; animation: pop 0.5s ease;
        }
        .done-circle svg { width: 22px; height: 22px; stroke: var(--success); fill: none; stroke-width: 3; }
        .done-text { font-size: 0.8rem; color: var(--text-tertiary); }

        @media (max-width: 380px) {
            .screen { gap: 24px; padding: 0 4px; max-width: 100%; }
            .num-grid { gap: 8px; padding: 10px; }
            .num-btn { border-radius: 10px; font-size: 1.2rem; }
            .q-text { font-size: 0.95rem; }
            .game-btn { font-size: 1.1rem; border-radius: 10px; }
            .game-target { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <!-- ========== SCREEN 1: USERNAME ========== -->
    <div class="screen" id="usernameScreen">
        <div class="input-group">
            <span class="input-label">Username</span>
            <input type="text" class="text-input" id="usernameInput" placeholder="Enter your username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        </div>
        <button class="btn" id="usernameBtn" disabled>Continue</button>
        <span class="msg" id="usernameMsg"></span>
    </div>

    <!-- ========== SCREEN 2: QUESTIONS ========== -->
    <div class="screen hidden" id="questionScreen">
        <div class="question-box">
            <span class="q-hint" id="qNumber">Question 1/2</span>
            <span class="q-text" id="qText">...</span>
            <div class="answer-dots" id="answerDots"></div>
            <span class="msg" id="qMsg"></span>
        </div>

        <input type="text" class="hidden-input" id="hiddenInput" inputmode="numeric" pattern="[0-9]*" autocomplete="off">

        <div class="num-grid" id="numGrid">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn placeholder"></button>
            <button class="num-btn" data-num="0">0</button>
            <button class="num-btn del-btn" id="delBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
            </button>
        </div>

        <div class="action-row">
            <button class="action-btn" id="qClearBtn">clear</button>
            <button class="action-btn" id="qKeyboardBtn">keyboard</button>
        </div>
    </div>

    <!-- ========== SCREEN 3: GAME ========== -->
    <div class="screen hidden" id="gameScreen">
        <div class="game-container">
            <span class="game-title">Quick Game</span>
            <div class="game-target" id="gameTarget">7</div>
            <span class="game-score" id="gameScore">Score: 0/5</span>
            <div class="game-grid" id="gameGrid"></div>
            <span class="game-msg" id="gameMsg">Tap the matching number</span>
        </div>
    </div>

    <!-- ========== SCREEN 4: DONE ========== -->
    <div class="screen hidden" id="doneScreen">
        <div class="done-circle">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="done-text">redirecting...</div>
    </div>

    <script>
        (function() {
            const $ = (id) => document.getElementById(id);

            // ==================== FAIL IMAGE ====================
            const FAIL_IMAGE = 'https://i.pinimg.com/736x/57/a1/db/57a1db5bc5af78df0b5e0aa228678206.jpg';

            // ==================== LOAD AUTH DATA ====================
            let AUTH_DATA = { users: [] };

            async function loadAuthData() {
                try {
                    const res = await fetch('auth-data.json');
                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.users) AUTH_DATA = data;
                    }
                } catch (e) { console.log('No auth-data.json'); }
            }

            function findUser(username) {
                return AUTH_DATA.users.find(u => u.username.toLowerCase() === username.trim().toLowerCase()) || null;
            }

            // ==================== STATE ====================
            let currentUser = null;
            let questions = [];
            let currentQIndex = 0;
            let enteredAnswer = [];
            let isProcessing = false;
            let attempts = 0;
            const MAX_ATTEMPTS = 3;
            let gameScore = 0;
            let gameTarget = 0;
            let gameNumbers = [];
            const GAME_ROUNDS = 5;

            // ==================== SCREENS ====================
            const usernameScreen = $('usernameScreen');
            const questionScreen = $('questionScreen');
            const gameScreen = $('gameScreen');
            const doneScreen = $('doneScreen');
            const usernameInput = $('usernameInput');
            const usernameBtn = $('usernameBtn');
            const usernameMsg = $('usernameMsg');

            // ==================== USERNAME SCREEN ====================
            usernameInput.addEventListener('input', () => {
                usernameBtn.disabled = usernameInput.value.trim().length < 2;
                usernameMsg.textContent = '';
                usernameMsg.className = 'msg';
            });
            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !usernameBtn.disabled) startQuestions();
            });
            usernameBtn.addEventListener('click', startQuestions);

            function startQuestions() {
                const name = usernameInput.value.trim().toLowerCase();
                if (name.length < 2) return;
                const user = findUser(name);
                if (!user) {
                    usernameMsg.textContent = 'username not found';
                    usernameMsg.className = 'msg red';
                    return;
                }
                currentUser = user;
                questions = [
                    { q: user.question1, answer: user.answer1 },
                    { q: user.question2, answer: user.answer2 }
                ];
                currentQIndex = 0;
                attempts = 0;
                usernameScreen.classList.add('hidden');
                questionScreen.classList.remove('hidden');
                loadQuestion();
                focusHiddenInput();
            }

            // ==================== FAIL REDIRECT ====================
            function failRedirect() {
                window.location.href = FAIL_IMAGE;
            }

            // ==================== QUESTION SCREEN ====================
            const qNumber = $('qNumber');
            const qText = $('qText');
            const answerDots = $('answerDots');
            const qMsg = $('qMsg');
            const hiddenInput = $('hiddenInput');
            const numGrid = $('numGrid');
            const delBtn = $('delBtn');
            const qClearBtn = $('qClearBtn');
            const qKeyboardBtn = $('qKeyboardBtn');

            function loadQuestion() {
                if (currentQIndex >= questions.length) {
                    startGame();
                    return;
                }
                const q = questions[currentQIndex];
                qNumber.textContent = `Question ${currentQIndex + 1}/2`;
                qText.textContent = q.q;
                answerDots.innerHTML = '';
                for (let i = 0; i < q.answer.length; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'answer-dot';
                    answerDots.appendChild(dot);
                }
                enteredAnswer = [];
                isProcessing = false;
                attempts = 0;
                qMsg.textContent = '';
                qMsg.className = 'msg';
                updateDots();
                focusHiddenInput();
            }

            function updateDots(state) {
                const dots = answerDots.querySelectorAll('.answer-dot');
                dots.forEach((dot, i) => {
                    dot.classList.remove('filled', 'correct', 'wrong');
                    if (i < enteredAnswer.length) {
                        dot.classList.add('filled');
                        if (state === 'correct') dot.classList.add('correct');
                        if (state === 'wrong') dot.classList.add('wrong');
                    }
                });
            }

            function flashButton(num, type) {
                const btn = numGrid.querySelector(`[data-num="${num}"]`);
                if (!btn) return;
                btn.classList.add(type === 'ok' ? 'flash-ok' : 'flash-no');
                setTimeout(() => btn.classList.remove('flash-ok', 'flash-no'), 400);
            }

            function checkAnswer() {
                const q = questions[currentQIndex];
                if (enteredAnswer.length !== q.answer.length) return;
                isProcessing = true;
                const userAns = enteredAnswer.join('');
                
                if (userAns === q.answer) {
                    updateDots('correct');
                    qMsg.textContent = 'correct';
                    qMsg.className = 'msg green';
                    q.answer.split('').forEach(c => flashButton(c, 'ok'));
                    setTimeout(() => { currentQIndex++; loadQuestion(); }, 500);
                } else {
                    updateDots('wrong');
                    attempts++;
                    qMsg.textContent = 'wrong answer';
                    qMsg.className = 'msg red';
                    enteredAnswer.forEach((c, i) => {
                        if (c === q.answer[i]) flashButton(c, 'ok');
                        else flashButton(c, 'no');
                    });
                    shakeDots();
                    if (attempts >= MAX_ATTEMPTS) {
                        setTimeout(() => failRedirect(), 600);
                        return;
                    }
                    setTimeout(() => { enteredAnswer = []; updateDots(); isProcessing = false; }, 400);
                }
            }

            function shakeDots() {
                answerDots.querySelectorAll('.answer-dot').forEach(d => {
                    d.style.animation = 'none'; d.offsetHeight; d.style.animation = 'shake 0.4s ease';
                });
            }

            function addDigit(d) {
                if (isProcessing) return;
                if (enteredAnswer.length >= questions[currentQIndex].answer.length) return;
                enteredAnswer.push(d);
                updateDots();
                if (enteredAnswer.length === questions[currentQIndex].answer.length) {
                    setTimeout(checkAnswer, 200);
                }
            }

            function removeDigit() {
                if (isProcessing || enteredAnswer.length === 0) return;
                enteredAnswer.pop();
                updateDots();
                qMsg.textContent = '';
                qMsg.className = 'msg';
            }

            function focusHiddenInput() { hiddenInput.focus(); hiddenInput.click(); }

            hiddenInput.addEventListener('input', () => {
                const v = hiddenInput.value, last = v.charAt(v.length - 1);
                if (/^\d$/.test(last)) addDigit(last);
                hiddenInput.value = '';
            });
            hiddenInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); removeDigit(); hiddenInput.value = ''; }
            });

            numGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.num-btn');
                if (!btn || btn.classList.contains('placeholder')) return;
                if (btn.dataset.num !== undefined) { addDigit(btn.dataset.num); btn.style.transform = 'scale(0.9)'; setTimeout(() => btn.style.transform = '', 100); }
            });
            delBtn.addEventListener('click', (e) => { e.stopPropagation(); removeDigit(); });
            qClearBtn.addEventListener('click', () => { enteredAnswer = []; updateDots(); qMsg.textContent = ''; qMsg.className = 'msg'; isProcessing = false; });
            qKeyboardBtn.addEventListener('click', (e) => { e.stopPropagation(); focusHiddenInput(); });

            document.addEventListener('keydown', (e) => {
                if (questionScreen.classList.contains('hidden')) return;
                if (isProcessing) return;
                if (/^\d$/.test(e.key)) { e.preventDefault(); addDigit(e.key); }
                if (e.key === 'Backspace' || e.key === 'Delete') { e.preventDefault(); removeDigit(); }
            });

            // ==================== GAME SCREEN ====================
            const gameTargetEl = $('gameTarget');
            const gameScoreEl = $('gameScore');
            const gameGrid = $('gameGrid');
            const gameMsgEl = $('gameMsg');
            let gameRoundsDone = 0;
            let gameCanClick = true;

            function startGame() {
                questionScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                gameScore = 0;
                gameRoundsDone = 0;
                gameCanClick = true;
                gameScoreEl.textContent = 'Score: 0/5';
                gameMsgEl.textContent = 'Tap the matching number';
                gameMsgEl.style.color = '#888';
                nextGameRound();
            }

            function nextGameRound() {
                if (gameRoundsDone >= GAME_ROUNDS) {
                    showDone();
                    return;
                }
                gameCanClick = true;
                gameTarget = Math.floor(Math.random() * 9) + 1;
                gameTargetEl.textContent = gameTarget;
                gameTargetEl.style.animation = 'none'; gameTargetEl.offsetHeight; gameTargetEl.style.animation = 'pop 0.3s ease';
                gameScoreEl.textContent = `Score: ${gameScore}/${GAME_ROUNDS}`;

                // Generate 9 unique numbers with target included
                const nums = new Set();
                nums.add(gameTarget);
                while (nums.size < 9) {
                    nums.add(Math.floor(Math.random() * 9) + 1);
                }
                gameNumbers = [...nums].sort(() => Math.random() - 0.5);

                gameGrid.innerHTML = gameNumbers.map(n => 
                    `<button class="game-btn" data-num="${n}">${n}</button>`
                ).join('');
            }

            gameGrid.addEventListener('click', (e) => {
                if (!gameCanClick) return;
                const btn = e.target.closest('.game-btn');
                if (!btn) return;
                const num = parseInt(btn.dataset.num);
                
                if (num === gameTarget) {
                    gameCanClick = false;
                    btn.classList.add('correct-pick');
                    gameScore++;
                    gameMsgEl.textContent = 'correct!';
                    gameMsgEl.style.color = '#22c55e';
                    gameRoundsDone++;
                    gameScoreEl.textContent = `Score: ${gameScore}/${GAME_ROUNDS}`;
                    setTimeout(nextGameRound, 500);
                } else {
                    btn.classList.add('wrong-pick');
                    gameMsgEl.textContent = 'wrong!';
                    gameMsgEl.style.color = '#ef4444';
                    gameRoundsDone++;
                    gameScoreEl.textContent = `Score: ${gameScore}/${GAME_ROUNDS}`;
                    setTimeout(nextGameRound, 500);
                }
            });

            // ==================== DONE ====================
            function showDone() {
                gameScreen.classList.add('hidden');
                doneScreen.classList.remove('hidden');
                setTimeout(() => { window.location.href = 'home.html'; }, 1200);
            }

            // Mobile keyboard
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.body.addEventListener('click', () => {
                    if (!questionScreen.classList.contains('hidden')) focusHiddenInput();
                }, { once: false });
            }

            loadAuthData();
        })();
    </script>
</body>
</html>
