<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OrabyMKB · Access Lock</title>
    <meta name="theme-color" content="#0d0d0d">
    
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-family);
            background: #0a0a0f;
            color: #e0e0e0;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }

        .lock-container {
            width: 100%; max-width: 380px;
            display: flex; flex-direction: column;
            align-items: center; gap: 28px;
        }

        /* Header */
        .lock-header {
            text-align: center; margin-bottom: 8px;
        }
        .lock-logo {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #6c47ff, #00c6ff);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 1.4rem;
            margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(108, 71, 255, 0.35);
        }
        .lock-title {
            font-size: 1.3rem; font-weight: 700; color: #fff;
            letter-spacing: -0.3px; margin-bottom: 6px;
        }
        .lock-subtitle {
            font-size: 0.8rem; color: #777; font-weight: 400;
        }

        /* PIN Dots */
        .pin-dots {
            display: flex; gap: 16px; justify-content: center;
            margin: 8px 0;
        }
        .pin-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid #333; background: transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .pin-dot.filled {
            border-color: #6c47ff; background: #6c47ff;
            box-shadow: 0 0 12px rgba(108, 71, 255, 0.5);
            animation: dotPop 0.3s ease;
        }
        .pin-dot.success {
            border-color: #22c55e; background: #22c55e;
            box-shadow: 0 0 16px rgba(34, 197, 94, 0.6);
        }
        .pin-dot.error {
            border-color: #ef4444; background: #ef4444;
            box-shadow: 0 0 16px rgba(239, 68, 68, 0.6);
            animation: shake 0.5s ease;
        }
        @keyframes dotPop {
            0% { transform: scale(0.5); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Hidden input for keyboard */
        .hidden-input {
            position: absolute; opacity: 0; height: 0; width: 0;
            pointer-events: none; top: -9999px;
        }

        /* Number Grid */
        .num-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; width: 100%; max-width: 320px;
        }
        .num-btn {
            aspect-ratio: 1; border-radius: 20px;
            border: 1.5px solid #1e1e2e; background: #111118;
            color: #e0e0e0; font-size: 1.5rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-family);
            position: relative; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .num-btn:hover {
            background: #1a1a28; border-color: #2a2a3e;
            transform: translateY(-1px);
        }
        .num-btn:active {
            transform: scale(0.95); background: #1e1e30;
            transition: all 0.1s ease;
        }
        .num-btn.success-flash {
            background: #0a2a10 !important; border-color: #22c55e !important;
            color: #22c55e !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            animation: flashGreen 0.5s ease;
        }
        .num-btn.error-flash {
            background: #2a0a0a !important; border-color: #ef4444 !important;
            color: #ef4444 !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            animation: flashRed 0.5s ease;
        }
        @keyframes flashGreen {
            0% { transform: scale(1); }
            30% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @keyframes flashRed {
            0% { transform: scale(1); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
            100% { transform: scale(1); }
        }

        /* Bottom row: empty, 0, delete */
        .num-btn.placeholder {
            border: none; background: transparent;
            pointer-events: none; cursor: default;
        }
        .num-btn.delete-btn {
            background: transparent; border-color: transparent;
            color: #777; font-size: 1.1rem;
        }
        .num-btn.delete-btn:hover {
            background: #1a1a28; border-color: #2a2a3e;
            color: #ef4444;
        }

        /* Actions */
        .lock-actions {
            display: flex; gap: 10px; width: 100%;
            max-width: 320px; margin-top: 4px;
        }
        .action-btn {
            flex: 1; padding: 12px; border-radius: 14px;
            border: 1.5px solid #1e1e2e; background: #111118;
            color: #999; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease;
            font-family: var(--font-family);
            display: flex; align-items: center; justify-content: center;
            gap: 6px;
        }
        .action-btn:hover {
            background: #1a1a28; border-color: #2a2a3e; color: #ccc;
        }
        .action-btn i { font-size: 1rem; }

        /* Status Message */
        .status-msg {
            text-align: center; font-size: 0.78rem; font-weight: 500;
            min-height: 24px; color: #555; transition: all 0.3s ease;
        }
        .status-msg.success { color: #22c55e; }
        .status-msg.error { color: #ef4444; }

        /* Success Overlay */
        .success-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; z-index: 100; opacity: 0;
            pointer-events: none; transition: opacity 0.4s ease;
        }
        .success-overlay.active {
            opacity: 1; pointer-events: all;
        }
        .success-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: #22c55e; display: flex; align-items: center;
            justify-content: center; font-size: 40px; color: #fff;
            margin-bottom: 20px; animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .success-text {
            font-size: 1.2rem; font-weight: 700; color: #fff;
            margin-bottom: 8px;
        }
        .success-subtext {
            font-size: 0.8rem; color: #aaa;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .lock-container { gap: 20px; padding: 10px; }
            .num-grid { gap: 10px; max-width: 280px; }
            .num-btn { border-radius: 16px; font-size: 1.3rem; }
            .pin-dots { gap: 14px; }
            .pin-dot { width: 14px; height: 14px; }
            .lock-logo { width: 46px; height: 46px; font-size: 1.1rem; }
            .lock-title { font-size: 1.1rem; }
        }
        @media (max-width: 340px) {
            .num-grid { gap: 8px; max-width: 240px; }
            .num-btn { border-radius: 14px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="lock-container">
        <!-- Header -->
        <div class="lock-header">
            <div class="lock-logo">OM</div>
            <div class="lock-title">OrabyMKB</div>
            <div class="lock-subtitle">Enter access code to continue</div>
        </div>

        <!-- PIN Dots -->
        <div class="pin-dots" id="pinDots">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>

        <!-- Status Message -->
        <div class="status-msg" id="statusMsg"></div>

        <!-- Hidden input to trigger mobile keyboard -->
        <input type="text" class="hidden-input" id="hiddenInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">

        <!-- Number Grid -->
        <div class="num-grid" id="numGrid">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn placeholder"></button>
            <button class="num-btn" data-num="0">0</button>
            <button class="num-btn delete-btn" id="deleteBtn"><i class="bx bx-left-arrow-alt"></i></button>
        </div>

        <!-- Action Buttons -->
        <div class="lock-actions">
            <button class="action-btn" id="clearBtn"><i class="bx bx-x"></i> Clear</button>
            <button class="action-btn" id="keyboardBtn"><i class="bx bx-keyboard"></i> Keyboard</button>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon"><i class="bx bx-check"></i></div>
        <div class="success-text">Access Granted</div>
        <div class="success-subtext">Redirecting to OrabyMKB...</div>
    </div>

    <script>
        (function() {
            // ==================== CONFIGURATION ====================
            const CORRECT_CODE = ['2', '5', '8', '0']; // The real code: 2-5-8-0
            const CODE_LENGTH = 4;
            const REDIRECT_URL = 'home.html'; // Redirect to home.html on success
            
            // ==================== DOM ELEMENTS ====================
            const $ = (id) => document.getElementById(id);
            const pinDots = $('pinDots');
            const statusMsg = $('statusMsg');
            const hiddenInput = $('hiddenInput');
            const numGrid = $('numGrid');
            const deleteBtn = $('deleteBtn');
            const clearBtn = $('clearBtn');
            const keyboardBtn = $('keyboardBtn');
            const successOverlay = $('successOverlay');
            
            // ==================== STATE ====================
            let enteredCode = [];
            let isProcessing = false;
            let attempts = 0;
            const MAX_ATTEMPTS = 5;
            
            // ==================== PIN DOT RENDERING ====================
            function updateDots(state = 'normal') {
                const dots = pinDots.querySelectorAll('.pin-dot');
                dots.forEach((dot, i) => {
                    // Reset classes
                    dot.classList.remove('filled', 'success', 'error');
                    
                    if (i < enteredCode.length) {
                        dot.classList.add('filled');
                        if (state === 'success') dot.classList.add('success');
                        if (state === 'error') dot.classList.add('error');
                    }
                });
            }
            
            // ==================== NUMBER BUTTON FLASH ====================
            function flashButton(num, type) {
                const btn = numGrid.querySelector(`[data-num="${num}"]`);
                if (!btn) return;
                
                btn.classList.add(type === 'success' ? 'success-flash' : 'error-flash');
                setTimeout(() => {
                    btn.classList.remove('success-flash', 'error-flash');
                }, 500);
            }
            
            // ==================== CODE VERIFICATION ====================
            function verifyCode() {
                if (enteredCode.length !== CODE_LENGTH) return;
                
                isProcessing = true;
                
                // Check each digit
                let allCorrect = true;
                for (let i = 0; i < CODE_LENGTH; i++) {
                    if (enteredCode[i] !== CORRECT_CODE[i]) {
                        allCorrect = false;
                        break;
                    }
                }
                
                if (allCorrect) {
                    // SUCCESS - All correct
                    updateDots('success');
                    statusMsg.textContent = 'Access granted!';
                    statusMsg.className = 'status-msg success';
                    
                    // Flash all correct buttons green
                    CORRECT_CODE.forEach(num => flashButton(num, 'success'));
                    
                    // Show success overlay and redirect to home.html
                    setTimeout(() => {
                        successOverlay.classList.add('active');
                    }, 400);
                    
                    setTimeout(() => {
                        window.location.href = REDIRECT_URL;
                    }, 2000);
                    
                } else {
                    // ERROR - Find which digits are wrong
                    updateDots('error');
                    statusMsg.textContent = 'Incorrect code. Try again.';
                    statusMsg.className = 'status-msg error';
                    
                    // Flash correct digits green, wrong digits red
                    enteredCode.forEach((digit, i) => {
                        if (digit === CORRECT_CODE[i]) {
                            flashButton(digit, 'success');
                        } else {
                            flashButton(digit, 'error');
                        }
                    });
                    
                    attempts++;
                    shakeDots();
                    
                    // Reset after delay
                    setTimeout(() => {
                        resetEntry();
                    }, 800);
                    
                    // Max attempts lockout
                    if (attempts >= MAX_ATTEMPTS) {
                        statusMsg.textContent = 'Too many attempts. Wait 30 seconds...';
                        statusMsg.className = 'status-msg error';
                        disableGrid(true);
                        setTimeout(() => {
                            disableGrid(false);
                            attempts = 0;
                            statusMsg.textContent = '';
                            statusMsg.className = 'status-msg';
                        }, 30000);
                    }
                }
            }
            
            function shakeDots() {
                const dots = pinDots.querySelectorAll('.pin-dot');
                dots.forEach(dot => {
                    dot.style.animation = 'none';
                    dot.offsetHeight; // Trigger reflow
                    dot.style.animation = 'shake 0.5s ease';
                });
            }
            
            function disableGrid(disabled) {
                const buttons = numGrid.querySelectorAll('.num-btn:not(.placeholder)');
                buttons.forEach(btn => {
                    if (disabled) {
                        btn.style.opacity = '0.4';
                        btn.style.pointerEvents = 'none';
                    } else {
                        btn.style.opacity = '1';
                        btn.style.pointerEvents = 'auto';
                    }
                });
            }
            
            // ==================== INPUT HANDLING ====================
            function addDigit(digit) {
                if (isProcessing) return;
                if (enteredCode.length >= CODE_LENGTH) return;
                
                enteredCode.push(digit);
                updateDots();
                
                // Check if code is complete
                if (enteredCode.length === CODE_LENGTH) {
                    setTimeout(() => verifyCode(), 300);
                }
            }
            
            function removeDigit() {
                if (isProcessing) return;
                if (enteredCode.length === 0) return;
                
                enteredCode.pop();
                updateDots();
                statusMsg.textContent = '';
                statusMsg.className = 'status-msg';
            }
            
            function resetEntry() {
                enteredCode = [];
                updateDots();
                statusMsg.textContent = '';
                statusMsg.className = 'status-msg';
                isProcessing = false;
            }
            
            function clearAll() {
                enteredCode = [];
                updateDots();
                statusMsg.textContent = '';
                statusMsg.className = 'status-msg';
                isProcessing = false;
                attempts = 0;
            }
            
            // ==================== KEYBOARD SUPPORT ====================
            function focusHiddenInput() {
                hiddenInput.focus();
                // On mobile, this pulls up the native keyboard
                hiddenInput.click();
            }
            
            hiddenInput.addEventListener('input', (e) => {
                const value = hiddenInput.value;
                const lastChar = value.charAt(value.length - 1);
                
                // Only process numeric input
                if (/^\d$/.test(lastChar)) {
                    addDigit(lastChar);
                }
                
                // Reset hidden input immediately
                hiddenInput.value = '';
            });
            
            hiddenInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    removeDigit();
                    hiddenInput.value = '';
                }
            });
            
            // ==================== EVENT LISTENERS ====================
            // Number grid buttons
            numGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.num-btn');
                if (!btn || btn.classList.contains('placeholder')) return;
                
                const num = btn.dataset.num;
                if (num !== undefined) {
                    addDigit(num);
                    // Brief haptic-like visual feedback
                    btn.style.transform = 'scale(0.93)';
                    setTimeout(() => { btn.style.transform = ''; }, 100);
                }
            });
            
            // Delete button
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeDigit();
            });
            
            // Clear button
            clearBtn.addEventListener('click', clearAll);
            
            // Keyboard toggle button
            keyboardBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                focusHiddenInput();
            });
            
            // Physical keyboard support
            document.addEventListener('keydown', (e) => {
                if (isProcessing) return;
                
                // Number keys (both main and numpad)
                if (/^\d$/.test(e.key)) {
                    e.preventDefault();
                    addDigit(e.key);
                    
                    // Also flash the corresponding button
                    const btn = numGrid.querySelector(`[data-num="${e.key}"]`);
                    if (btn) {
                        btn.style.background = '#1a1a30';
                        setTimeout(() => { btn.style.background = ''; }, 150);
                    }
                }
                
                // Backspace/Delete
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    removeDigit();
                }
                
                // Escape to clear
                if (e.key === 'Escape') {
                    e.preventDefault();
                    clearAll();
                }
            });
            
            // Auto-focus hidden input on page load (for mobile keyboard)
            setTimeout(() => {
                // Don't auto-focus on desktop, only on touch devices
                if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                    // Let user tap first to focus
                    document.body.addEventListener('click', function autoFocus() {
                        focusHiddenInput();
                        document.body.removeEventListener('click', autoFocus);
                    }, { once: false });
                }
            }, 500);
            
            // ==================== INITIALIZE ====================
            updateDots();
            
        })();
    </script>
</body>
</html>
