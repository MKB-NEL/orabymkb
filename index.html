<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Access</title>
    <meta name="theme-color" content="#f4f2ee">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --bg: #f4f2ee;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #191919;
            --text-secondary: #595856;
            --text-tertiary: #868482;
            --primary: #6c47ff;
            --primary-hover: #5835e8;
            --success: #057642;
            --danger: #d11124;
            --game-bg: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font); background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased; user-select: none;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }

        .screen {
            width: 100%; max-width: 340px; display: flex;
            flex-direction: column; align-items: center; gap: 28px;
            animation: fadeIn 0.35s ease;
        }
        .screen.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)} }
        @keyframes pop { 0%{transform:scale(0.7)}60%{transform:scale(1.08)}100%{transform:scale(1)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)} }

        .input-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-tertiary); text-align: center;
        }

        /* Username input */
        .text-input {
            width: 100%; padding: 14px 18px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: var(--text); font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease; text-align: center;
        }
        .text-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
        .text-input::placeholder { color: #b0b0b0; }

        /* Hidden password input - shows emoji faces */
        .password-wrap {
            width: 100%; position: relative;
        }
        .password-input {
            width: 100%; padding: 14px 18px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: transparent; font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease; text-align: center;
            caret-color: var(--primary); position: relative; z-index: 2;
            -webkit-text-security: none;
        }
        .password-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
        .password-input::placeholder { color: #b0b0b0; }

        /* Emoji overlay */
        .emoji-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.5rem; letter-spacing: 4px; pointer-events: none; z-index: 1;
            display: flex; gap: 4px; justify-content: center; align-items: center;
        }
        .emoji-char {
            display: inline-block; animation: pop 0.2s ease;
            transition: all 0.2s ease;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            font-weight: 600; font-size: 0.9rem; font-family: var(--font);
            cursor: pointer; transition: all 0.2s ease; background: var(--primary);
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        .q-hint {
            font-size: 0.62rem; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .q-text {
            font-size: 1.05rem; font-weight: 600; color: var(--text);
            text-align: center; line-height: 1.45; padding: 0 8px;
        }

        .msg { font-size: 0.7rem; font-weight: 500; min-height: 16px; text-align: center; transition: all 0.3s ease; }
        .msg.red { color: var(--danger); }
        .msg.green { color: var(--success); }
        .msg.gray { color: var(--text-tertiary); }

        /* Game */
        .game-container {
            width: 100%; background: var(--game-bg); border-radius: 20px;
            padding: 20px 16px; display: flex; flex-direction: column;
            align-items: center; gap: 16px; color: #e0e0e0;
        }
        .game-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #888; }
        .game-target { font-size: 3rem; font-weight: 800; color: #fff; animation: pop 0.3s ease; }
        .game-score { font-size: 0.75rem; color: #aaa; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .game-btn {
            aspect-ratio: 1; border-radius: 12px; border: 1.5px solid #2a2a40;
            background: #111122; color: #ccc; font-size: 1.3rem; font-weight: 600;
            cursor: pointer; transition: all 0.12s ease; display: flex;
            align-items: center; justify-content: center; font-family: var(--font);
        }
        .game-btn:active { transform: scale(0.9); background: #1a1a30; }
        .game-btn.correct-pick { background: #0a2a10 !important; border-color: #22c55e !important; color: #22c55e !important; }
        .game-btn.wrong-pick { background: #2a0a0a !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        .game-msg { font-size: 0.7rem; color: #888; min-height: 16px; text-align: center; }

        .done-circle {
            width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--success);
            display: flex; align-items: center; justify-content: center; animation: pop 0.5s ease;
        }
        .done-circle svg { width: 22px; height: 22px; stroke: var(--success); fill: none; stroke-width: 3; }
        .done-text { font-size: 0.8rem; color: var(--text-tertiary); }

        @media (max-width: 380px) {
            .screen { gap: 22px; padding: 0 4px; max-width: 100%; }
            .q-text { font-size: 0.9rem; }
            .game-btn { font-size: 1.1rem; border-radius: 10px; }
            .game-target { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <!-- ========== SCREEN 1: USERNAME ========== -->
    <div class="screen" id="usernameScreen">
        <span class="input-label">Username</span>
        <input type="text" class="text-input" id="usernameInput" placeholder="Enter your username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn" id="usernameBtn" disabled>Continue</button>
        <span class="msg" id="usernameMsg"></span>
    </div>

    <!-- ========== SCREEN 2: QUESTIONS ========== -->
    <div class="screen hidden" id="questionScreen">
        <span class="q-hint" id="qNumber">Question 1/2</span>
        <span class="q-text" id="qText">...</span>
        
        <!-- Password input with emoji overlay -->
        <div class="password-wrap">
            <div class="emoji-display" id="emojiDisplay"></div>
            <input type="password" class="password-input" id="answerInput" placeholder="Type your answer" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        
        <span class="msg" id="qMsg"></span>
        <button class="btn" id="submitAnswer">Submit</button>
    </div>

    <!-- ========== SCREEN 3: GAME ========== -->
    <div class="screen hidden" id="gameScreen">
        <div class="game-container">
            <span class="game-title">Quick Game</span>
            <div class="game-target" id="gameTarget">7</div>
            <span class="game-score" id="gameScore">Score: 0/5</span>
            <div class="game-grid" id="gameGrid"></div>
            <span class="game-msg" id="gameMsg">Tap the matching number</span>
        </div>
    </div>

    <!-- ========== SCREEN 4: DONE ========== -->
    <div class="screen hidden" id="doneScreen">
        <div class="done-circle">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="done-text">redirecting...</div>
    </div>

    <script>
        (function() {
            const $ = (id) => document.getElementById(id);
            const FAIL_IMAGE = 'https://i.pinimg.com/736x/57/a1/db/57a1db5bc5af78df0b5e0aa228678206.jpg';

            // ==================== EMOJI FACES ====================
            const EMOJIS = ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵','🤯','🤠','🥳','🥸','😎','🤓','🧐','😕','😟','🙁','😮','😯','😲','😳','🥺','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','☠️','💩','🤡','👻','👽','👾','🤖','🎃','😺','😸','😹','😻','😼','😽','🙀','😿','😾'];

            function getRandomEmoji() {
                return EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
            }

            // ==================== LOAD AUTH DATA ====================
            let AUTH_DATA = { users: [] };

            async function loadAuthData() {
                try {
                    const res = await fetch('auth-data.json');
                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.users) AUTH_DATA = data;
                    }
                } catch (e) {}
            }

            function findUser(username) {
                return AUTH_DATA.users.find(u => u.username.toLowerCase() === username.trim().toLowerCase()) || null;
            }

            // ==================== STATE ====================
            let currentUser = null;
            let questions = [];
            let currentQIndex = 0;
            let attempts = 0;
            const MAX_ATTEMPTS = 3;
            let gameScore = 0;
            let gameTarget = 0;
            let gameNumbers = [];
            const GAME_ROUNDS = 5;

            // ==================== SCREENS ====================
            const usernameScreen = $('usernameScreen');
            const questionScreen = $('questionScreen');
            const gameScreen = $('gameScreen');
            const doneScreen = $('doneScreen');
            const usernameInput = $('usernameInput');
            const usernameBtn = $('usernameBtn');
            const usernameMsg = $('usernameMsg');

            // ==================== USERNAME SCREEN ====================
            usernameInput.addEventListener('input', () => {
                usernameBtn.disabled = usernameInput.value.trim().length < 2;
                usernameMsg.textContent = '';
                usernameMsg.className = 'msg';
            });
            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !usernameBtn.disabled) startQuestions();
            });
            usernameBtn.addEventListener('click', startQuestions);

            function startQuestions() {
                const name = usernameInput.value.trim().toLowerCase();
                if (name.length < 2) return;
                const user = findUser(name);
                if (!user) {
                    usernameMsg.textContent = 'username not found';
                    usernameMsg.className = 'msg red';
                    return;
                }
                currentUser = user;
                questions = [
                    { q: user.question1, answer: user.answer1 },
                    { q: user.question2, answer: user.answer2 }
                ];
                currentQIndex = 0;
                attempts = 0;
                usernameScreen.classList.add('hidden');
                questionScreen.classList.remove('hidden');
                loadQuestion();
            }

            function failRedirect() {
                window.location.href = FAIL_IMAGE;
            }

            // ==================== QUESTION SCREEN ====================
            const qNumber = $('qNumber');
            const qText = $('qText');
            const answerInput = $('answerInput');
            const emojiDisplay = $('emojiDisplay');
            const qMsg = $('qMsg');
            const submitAnswer = $('submitAnswer');

            function loadQuestion() {
                if (currentQIndex >= questions.length) {
                    startGame();
                    return;
                }
                const q = questions[currentQIndex];
                qNumber.textContent = `Question ${currentQIndex + 1}/2`;
                qText.textContent = q.q;
                answerInput.value = '';
                emojiDisplay.innerHTML = '';
                qMsg.textContent = '';
                qMsg.className = 'msg';
                attempts = 0;
                answerInput.focus();
            }

            // Show emoji faces as user types
            answerInput.addEventListener('input', () => {
                const val = answerInput.value;
                let html = '';
                for (let i = 0; i < val.length; i++) {
                    html += `<span class="emoji-char">${getRandomEmoji()}</span>`;
                }
                emojiDisplay.innerHTML = html;
            });

            answerInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkAnswer();
                }
            });

            submitAnswer.addEventListener('click', checkAnswer);

            function checkAnswer() {
                const q = questions[currentQIndex];
                const userAns = answerInput.value.trim();
                
                if (userAns === '') return;
                
                if (userAns === q.answer) {
                    qMsg.textContent = 'correct';
                    qMsg.className = 'msg green';
                    emojiDisplay.innerHTML = '<span style="font-size:2rem;">🎉</span>';
                    setTimeout(() => {
                        currentQIndex++;
                        loadQuestion();
                    }, 600);
                } else {
                    attempts++;
                    qMsg.textContent = 'wrong answer';
                    qMsg.className = 'msg red';
                    emojiDisplay.innerHTML = '<span style="font-size:2rem;">❌</span>';
                    
                    if (attempts >= MAX_ATTEMPTS) {
                        emojiDisplay.innerHTML = '<span style="font-size:2rem;">💀</span>';
                        setTimeout(() => failRedirect(), 800);
                        return;
                    }
                    
                    setTimeout(() => {
                        answerInput.value = '';
                        emojiDisplay.innerHTML = '';
                        qMsg.textContent = '';
                        qMsg.className = 'msg';
                        answerInput.focus();
                    }, 600);
                }
            }

            // ==================== GAME SCREEN ====================
            const gameTargetEl = $('gameTarget');
            const gameScoreEl = $('gameScore');
            const gameGrid = $('gameGrid');
            const gameMsgEl = $('gameMsg');
            let gameRoundsDone = 0;
            let gameCanClick = true;

            function startGame() {
                questionScreen.classList.add('hidden');
                gameScreen.classList.remove('hidden');
                gameScore = 0;
                gameRoundsDone = 0;
                gameCanClick = true;
                gameScoreEl.textContent = 'Score: 0/5';
                gameMsgEl.textContent = 'Tap the matching number';
                gameMsgEl.style.color = '#888';
                nextGameRound();
            }

            function nextGameRound() {
                if (gameRoundsDone >= GAME_ROUNDS) {
                    showDone();
                    return;
                }
                gameCanClick = true;
                gameTarget = Math.floor(Math.random() * 9) + 1;
                gameTargetEl.textContent = gameTarget;
                gameTargetEl.style.animation = 'none';
                gameTargetEl.offsetHeight;
                gameTargetEl.style.animation = 'pop 0.3s ease';
                gameScoreEl.textContent = `Score: ${gameScore}/${GAME_ROUNDS}`;

                const nums = new Set();
                nums.add(gameTarget);
                while (nums.size < 9) nums.add(Math.floor(Math.random() * 9) + 1);
                gameNumbers = [...nums].sort(() => Math.random() - 0.5);

                gameGrid.innerHTML = gameNumbers.map(n => 
                    `<button class="game-btn" data-num="${n}">${n}</button>`
                ).join('');
            }

            gameGrid.addEventListener('click', (e) => {
                if (!gameCanClick) return;
                const btn = e.target.closest('.game-btn');
                if (!btn) return;
                const num = parseInt(btn.dataset.num);
                
                gameCanClick = false;
                if (num === gameTarget) {
                    btn.classList.add('correct-pick');
                    gameScore++;
                    gameMsgEl.textContent = 'correct!';
                    gameMsgEl.style.color = '#22c55e';
                } else {
                    btn.classList.add('wrong-pick');
                    gameMsgEl.textContent = 'wrong!';
                    gameMsgEl.style.color = '#ef4444';
                }
                gameRoundsDone++;
                gameScoreEl.textContent = `Score: ${gameScore}/${GAME_ROUNDS}`;
                setTimeout(nextGameRound, 500);
            });

            // ==================== DONE ====================
            function showDone() {
                gameScreen.classList.add('hidden');
                doneScreen.classList.remove('hidden');
                setTimeout(() => { window.location.href = 'home.html'; }, 1200);
            }

            loadAuthData();
        })();
    </script>
</body>
</html>
