<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Access</title>
    <meta name="theme-color" content="#0d0d0d">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font); background: #08080c; color: #ccc;
            -webkit-font-smoothing: antialiased; user-select: none;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }

        .screen {
            width: 100%; max-width: 360px; display: flex;
            flex-direction: column; align-items: center; gap: 32px;
            animation: fadeIn 0.4s ease;
        }
        .screen.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)} }
        @keyframes pop { 0%{transform:scale(0.6)}60%{transform:scale(1.1)}100%{transform:scale(1)} }

        /* Username Screen */
        .input-group {
            width: 100%; display: flex; flex-direction: column; gap: 8px;
        }
        .input-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.5px; color: #555;
        }
        .text-input {
            width: 100%; padding: 14px 18px; border-radius: 16px;
            border: 1.5px solid #1a1a24; background: #0e0e14;
            color: #e0e0e0; font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease;
        }
        .text-input:focus { border-color: #6c47ff; box-shadow: 0 0 0 3px rgba(108,71,255,0.12); }
        .text-input::placeholder { color: #333; }

        .btn {
            width: 100%; padding: 14px; border-radius: 16px; border: none;
            font-weight: 600; font-size: 0.9rem; font-family: var(--font);
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #6c47ff; color: #fff; }
        .btn-primary:hover { background: #7b5ce8; }
        .btn-primary:disabled { opacity: 0.35; pointer-events: none; }

        /* Question Screen */
        .question-box {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 24px;
        }
        .q-text {
            font-size: 1.05rem; font-weight: 600; color: #ddd;
            text-align: center; line-height: 1.4;
        }
        .q-hint {
            font-size: 0.65rem; color: #555; text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hidden answer - dots */
        .answer-dots {
            display: flex; gap: 10px; justify-content: center;
        }
        .answer-dot {
            width: 10px; height: 10px; border-radius: 50%;
            border: 1.5px solid #222; background: transparent;
            transition: all 0.2s ease;
        }
        .answer-dot.filled {
            border-color: #6c47ff; background: #6c47ff;
            animation: pop 0.25s ease;
        }
        .answer-dot.correct {
            border-color: #22c55e; background: #22c55e;
            box-shadow: 0 0 10px rgba(34,197,94,0.4);
        }
        .answer-dot.wrong {
            border-color: #ef4444; background: #ef4444;
            box-shadow: 0 0 10px rgba(239,68,68,0.4);
            animation: shake 0.4s ease;
        }

        /* Hidden input */
        .hidden-input {
            position: absolute; opacity: 0; height: 0; width: 0; pointer-events: none;
        }

        /* Number grid */
        .num-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%;
        }
        .num-btn {
            aspect-ratio: 1; border-radius: 16px;
            border: 1.5px solid #15151f; background: #0c0c14;
            color: #ccc; font-size: 1.4rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font); -webkit-tap-highlight-color: transparent;
        }
        .num-btn:hover { background: #12121d; border-color: #252540; }
        .num-btn:active { transform: scale(0.93); background: #1a1a2a; }
        .num-btn.flash-ok {
            background: #0a1a0a !important; border-color: #22c55e !important;
            color: #22c55e !important; animation: pop 0.3s ease;
        }
        .num-btn.flash-no {
            background: #1a0a0a !important; border-color: #ef4444 !important;
            color: #ef4444 !important; animation: shake 0.3s ease;
        }
        .num-btn.placeholder { border: none; background: transparent; pointer-events: none; }
        .num-btn.del-btn {
            background: transparent; border-color: transparent; color: #444; font-size: 1.1rem;
        }
        .num-btn.del-btn:hover { background: #12121d; border-color: #252540; color: #ef4444; }

        /* Action row */
        .action-row {
            display: flex; gap: 8px; width: 100%;
        }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #1a1a24;
            background: transparent; color: #555; font-size: 0.72rem; font-weight: 600;
            cursor: pointer; font-family: var(--font); transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .action-btn:hover { background: #11111a; color: #888; border-color: #252540; }

        /* Subtle message */
        .subtle-msg {
            font-size: 0.68rem; color: #444; min-height: 18px;
            text-align: center; transition: all 0.3s ease;
        }
        .subtle-msg.ok { color: #22c55e; }
        .subtle-msg.no { color: #ef4444; }

        /* Done screen */
        .done-screen {
            display: flex; flex-direction: column; align-items: center; gap: 16px;
        }
        .done-circle {
            width: 48px; height: 48px; border-radius: 50%;
            border: 2px solid #22c55e; display: flex; align-items: center;
            justify-content: center; animation: pop 0.5s ease;
        }
        .done-circle svg { width: 24px; height: 24px; stroke: #22c55e; fill: none; stroke-width: 3; }
        .done-text { font-size: 0.85rem; color: #666; }

        @media (max-width: 380px) {
            .screen { gap: 24px; padding: 0 8px; }
            .num-grid { gap: 8px; }
            .num-btn { border-radius: 14px; font-size: 1.2rem; }
            .q-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- ========== SCREEN 1: USERNAME ========== -->
    <div class="screen" id="usernameScreen">
        <div class="input-group">
            <span class="input-label">Username</span>
            <input type="text" class="text-input" id="usernameInput" placeholder="Enter your username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        </div>
        <button class="btn btn-primary" id="usernameBtn" disabled>Continue</button>
        <span class="subtle-msg" id="usernameMsg"></span>
    </div>

    <!-- ========== SCREEN 2: QUESTIONS ========== -->
    <div class="screen hidden" id="questionScreen">
        <div class="question-box">
            <span class="q-hint" id="qNumber">Question 1/4</span>
            <span class="q-text" id="qText">...</span>
            <div class="answer-dots" id="answerDots"></div>
            <span class="subtle-msg" id="qMsg"></span>
        </div>

        <!-- Hidden input for keyboard -->
        <input type="text" class="hidden-input" id="hiddenInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">

        <div class="num-grid" id="numGrid">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn placeholder"></button>
            <button class="num-btn" data-num="0">0</button>
            <button class="num-btn del-btn" id="delBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
            </button>
        </div>

        <div class="action-row">
            <button class="action-btn" id="qClearBtn">clear</button>
            <button class="action-btn" id="qKeyboardBtn">keyboard</button>
        </div>
    </div>

    <!-- ========== SCREEN 3: DONE ========== -->
    <div class="screen hidden" id="doneScreen">
        <div class="done-screen">
            <div class="done-circle">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="done-text">redirecting...</div>
        </div>
    </div>

    <script>
        (function() {
            const $ = (id) => document.getElementById(id);

            // ==================== USER DATABASE ====================
            // Each user has: username, questions (array of {q, answer: [digits]})
            const USERS = {
                'oraby': {
                    questions: [
                        { q: 'Year of birth?', answer: ['1', '9', '9', '5'] },
                        { q: 'Month of birth? (MM)', answer: ['0', '7'] },
                        { q: 'Lucky number?', answer: ['2', '3'] },
                        { q: 'Access code?', answer: ['2', '5', '8', '0'] },
                    ]
                },
                'admin': {
                    questions: [
                        { q: 'System year?', answer: ['2', '0', '2', '4'] },
                        { q: 'Root digits?', answer: ['1', '0'] },
                        { q: 'Security pin?', answer: ['7', '7', '7'] },
                        { q: 'Master key?', answer: ['9', '1', '1'] },
                    ]
                },
                'mkb': {
                    questions: [
                        { q: 'Birth day? (DD)', answer: ['1', '5'] },
                        { q: 'Favorite digit?', answer: ['7'] },
                        { q: 'Code part 1?', answer: ['3', '6'] },
                        { q: 'Code part 2?', answer: ['9', '0'] },
                    ]
                }
            };

            // Default questions for unknown users
            const DEFAULT_QUESTIONS = [
                { q: 'Enter PIN part 1', answer: ['1', '2', '3'] },
                { q: 'Enter PIN part 2', answer: ['4', '5', '6'] },
                { q: 'Enter PIN part 3', answer: ['7', '8'] },
                { q: 'Enter PIN part 4', answer: ['9', '0'] },
            ];

            // ==================== STATE ====================
            let currentUser = null;
            let currentQuestions = [];
            let currentQIndex = 0;
            let enteredAnswer = [];
            let isProcessing = false;
            let attempts = 0;
            const MAX_ATTEMPTS = 3;

            // ==================== SCREENS ====================
            const usernameScreen = $('usernameScreen');
            const questionScreen = $('questionScreen');
            const doneScreen = $('doneScreen');
            const usernameInput = $('usernameInput');
            const usernameBtn = $('usernameBtn');
            const usernameMsg = $('usernameMsg');

            // ==================== USERNAME SCREEN ====================
            usernameInput.addEventListener('input', () => {
                const val = usernameInput.value.trim();
                usernameBtn.disabled = val.length < 2;
                usernameMsg.textContent = '';
                usernameMsg.className = 'subtle-msg';
            });

            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !usernameBtn.disabled) {
                    startQuestions();
                }
            });

            usernameBtn.addEventListener('click', startQuestions);

            function startQuestions() {
                const name = usernameInput.value.trim().toLowerCase();
                if (name.length < 2) return;

                currentUser = name;
                
                // Find user or use default
                if (USERS[name]) {
                    currentQuestions = USERS[name].questions;
                } else {
                    // Shuffle default questions for variety
                    currentQuestions = [...DEFAULT_QUESTIONS].sort(() => Math.random() - 0.5);
                }

                currentQIndex = 0;
                attempts = 0;
                usernameScreen.classList.add('hidden');
                questionScreen.classList.remove('hidden');
                loadQuestion();
                focusHiddenInput();
            }

            // ==================== QUESTION SCREEN ====================
            const qNumber = $('qNumber');
            const qText = $('qText');
            const answerDots = $('answerDots');
            const qMsg = $('qMsg');
            const hiddenInput = $('hiddenInput');
            const numGrid = $('numGrid');
            const delBtn = $('delBtn');
            const qClearBtn = $('qClearBtn');
            const qKeyboardBtn = $('qKeyboardBtn');

            function loadQuestion() {
                if (currentQIndex >= currentQuestions.length) {
                    // All questions answered correctly
                    showDone();
                    return;
                }

                const question = currentQuestions[currentQIndex];
                qNumber.textContent = `Question ${currentQIndex + 1}/${currentQuestions.length}`;
                qText.textContent = question.q;
                
                // Create answer dots
                answerDots.innerHTML = '';
                for (let i = 0; i < question.answer.length; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'answer-dot';
                    answerDots.appendChild(dot);
                }
                
                enteredAnswer = [];
                isProcessing = false;
                attempts = 0;
                qMsg.textContent = '';
                qMsg.className = 'subtle-msg';
                
                updateDots();
                focusHiddenInput();
            }

            function updateDots(state) {
                const dots = answerDots.querySelectorAll('.answer-dot');
                dots.forEach((dot, i) => {
                    dot.classList.remove('filled', 'correct', 'wrong');
                    if (i < enteredAnswer.length) {
                        dot.classList.add('filled');
                        if (state === 'correct') dot.classList.add('correct');
                        if (state === 'wrong') dot.classList.add('wrong');
                    }
                });
            }

            function flashButton(num, type) {
                const btn = numGrid.querySelector(`[data-num="${num}"]`);
                if (!btn) return;
                btn.classList.add(type === 'ok' ? 'flash-ok' : 'flash-no');
                setTimeout(() => btn.classList.remove('flash-ok', 'flash-no'), 400);
            }

            function checkAnswer() {
                const question = currentQuestions[currentQIndex];
                if (enteredAnswer.length !== question.answer.length) return;

                isProcessing = true;

                let allCorrect = true;
                for (let i = 0; i < question.answer.length; i++) {
                    if (enteredAnswer[i] !== question.answer[i]) {
                        allCorrect = false;
                        break;
                    }
                }

                if (allCorrect) {
                    updateDots('correct');
                    qMsg.textContent = '';
                    qMsg.className = 'subtle-msg';
                    
                    question.answer.forEach(d => flashButton(d, 'ok'));
                    
                    setTimeout(() => {
                        currentQIndex++;
                        loadQuestion();
                    }, 600);

                } else {
                    updateDots('wrong');
                    attempts++;
                    
                    enteredAnswer.forEach((d, i) => {
                        if (d === question.answer[i]) flashButton(d, 'ok');
                        else flashButton(d, 'no');
                    });

                    shakeDots();

                    if (attempts >= MAX_ATTEMPTS) {
                        qMsg.textContent = 'too many tries';
                        qMsg.className = 'subtle-msg no';
                        disableGrid(true);
                        setTimeout(() => {
                            disableGrid(false);
                            enteredAnswer = [];
                            updateDots();
                            qMsg.textContent = '';
                            qMsg.className = 'subtle-msg';
                            isProcessing = false;
                            attempts = 0;
                        }, 2000);
                    } else {
                        setTimeout(() => {
                            enteredAnswer = [];
                            updateDots();
                            isProcessing = false;
                        }, 500);
                    }
                }
            }

            function shakeDots() {
                const dots = answerDots.querySelectorAll('.answer-dot');
                dots.forEach(d => {
                    d.style.animation = 'none';
                    d.offsetHeight;
                    d.style.animation = 'shake 0.4s ease';
                });
            }

            function disableGrid(disabled) {
                const btns = numGrid.querySelectorAll('.num-btn:not(.placeholder)');
                btns.forEach(b => {
                    b.style.opacity = disabled ? '0.3' : '1';
                    b.style.pointerEvents = disabled ? 'none' : 'auto';
                });
            }

            function addDigit(d) {
                if (isProcessing) return;
                const question = currentQuestions[currentQIndex];
                if (enteredAnswer.length >= question.answer.length) return;

                enteredAnswer.push(d);
                updateDots();

                if (enteredAnswer.length === question.answer.length) {
                    setTimeout(() => checkAnswer(), 250);
                }
            }

            function removeDigit() {
                if (isProcessing) return;
                if (enteredAnswer.length === 0) return;
                enteredAnswer.pop();
                updateDots();
                qMsg.textContent = '';
                qMsg.className = 'subtle-msg';
            }

            // ==================== KEYBOARD ====================
            function focusHiddenInput() {
                hiddenInput.focus();
                hiddenInput.click();
            }

            hiddenInput.addEventListener('input', () => {
                const val = hiddenInput.value;
                const last = val.charAt(val.length - 1);
                if (/^\d$/.test(last)) addDigit(last);
                hiddenInput.value = '';
            });

            hiddenInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    removeDigit();
                    hiddenInput.value = '';
                }
            });

            // ==================== EVENT LISTENERS ====================
            numGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.num-btn');
                if (!btn || btn.classList.contains('placeholder')) return;
                const num = btn.dataset.num;
                if (num !== undefined) {
                    addDigit(num);
                    btn.style.transform = 'scale(0.9)';
                    setTimeout(() => btn.style.transform = '', 100);
                }
            });

            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeDigit();
            });

            qClearBtn.addEventListener('click', () => {
                enteredAnswer = [];
                updateDots();
                qMsg.textContent = '';
                qMsg.className = 'subtle-msg';
                isProcessing = false;
            });

            qKeyboardBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                focusHiddenInput();
            });

            // Physical keyboard
            document.addEventListener('keydown', (e) => {
                if (questionScreen.classList.contains('hidden')) return;
                if (isProcessing) return;

                if (/^\d$/.test(e.key)) {
                    e.preventDefault();
                    addDigit(e.key);
                }
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    removeDigit();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    enteredAnswer = [];
                    updateDots();
                }
            });

            // Auto-focus on mobile
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.body.addEventListener('click', () => {
                    if (!questionScreen.classList.contains('hidden')) focusHiddenInput();
                }, { once: false });
            }

            // ==================== DONE ====================
            function showDone() {
                questionScreen.classList.add('hidden');
                doneScreen.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1200);
            }

        })();
    </script>
</body>
</html>
