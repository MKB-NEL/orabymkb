<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Access</title>
    <meta name="theme-color" content="#f4f2ee">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --bg: #f4f2ee;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #191919;
            --text-secondary: #595856;
            --text-tertiary: #868482;
            --primary: #6c47ff;
            --primary-hover: #5835e8;
            --success: #057642;
            --danger: #d11124;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font); background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased; user-select: none;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }

        .screen {
            width: 100%; max-width: 360px; display: flex;
            flex-direction: column; align-items: center; gap: 28px;
            animation: fadeIn 0.35s ease;
        }
        .screen.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)} }
        @keyframes pop { 0%{transform:scale(0.7)}60%{transform:scale(1.08)}100%{transform:scale(1)} }

        /* Input */
        .input-group {
            width: 100%; display: flex; flex-direction: column; gap: 6px;
        }
        .input-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-tertiary);
        }
        .text-input {
            width: 100%; padding: 14px 18px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: var(--text); font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease;
        }
        .text-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
        .text-input::placeholder { color: #b0b0b0; }

        .btn {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            font-weight: 600; font-size: 0.9rem; font-family: var(--font);
            cursor: pointer; transition: all 0.2s ease; background: var(--primary);
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        /* Question */
        .question-box {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .q-hint {
            font-size: 0.65rem; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .q-text {
            font-size: 1rem; font-weight: 600; color: var(--text);
            text-align: center; line-height: 1.4;
        }

        /* Answer dots */
        .answer-dots { display: flex; gap: 10px; justify-content: center; }
        .answer-dot {
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #d1d5db; background: transparent;
            transition: all 0.2s ease;
        }
        .answer-dot.filled {
            border-color: var(--primary); background: var(--primary);
            animation: pop 0.2s ease;
        }
        .answer-dot.correct {
            border-color: var(--success); background: var(--success);
            box-shadow: 0 0 8px rgba(5,118,66,0.3);
        }
        .answer-dot.wrong {
            border-color: var(--danger); background: var(--danger);
            box-shadow: 0 0 8px rgba(209,17,36,0.3);
            animation: shake 0.4s ease;
        }

        /* Hidden input */
        .hidden-input {
            position: absolute; opacity: 0; height: 0; width: 0; pointer-events: none;
        }

        /* Number grid */
        .num-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%; background: var(--surface);
            border: 1px solid var(--border); border-radius: 16px;
            padding: 14px;
        }
        .num-btn {
            aspect-ratio: 1; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg);
            color: var(--text); font-size: 1.3rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font); -webkit-tap-highlight-color: transparent;
        }
        .num-btn:hover { background: #e8e6e0; border-color: #c0bfbc; }
        .num-btn:active { transform: scale(0.94); background: #ddd; }
        .num-btn.flash-ok {
            background: #e9f7ef !important; border-color: var(--success) !important;
            color: var(--success) !important; animation: pop 0.3s ease;
        }
        .num-btn.flash-no {
            background: #fdecea !important; border-color: var(--danger) !important;
            color: var(--danger) !important; animation: shake 0.3s ease;
        }
        .num-btn.placeholder { border: none; background: transparent; pointer-events: none; }
        .num-btn.del-btn {
            background: transparent; border-color: transparent; color: var(--text-tertiary);
            font-size: 1rem;
        }
        .num-btn.del-btn:hover { background: var(--bg); border-color: var(--border); color: var(--danger); }

        /* Action row */
        .action-row { display: flex; gap: 8px; width: 100%; }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text-tertiary); font-size: 0.7rem;
            font-weight: 600; cursor: pointer; font-family: var(--font);
            transition: all 0.2s ease; text-align: center;
        }
        .action-btn:hover { background: #f9fafb; color: var(--text-secondary); }

        /* Subtle message */
        .subtle-msg {
            font-size: 0.68rem; color: var(--text-tertiary); min-height: 16px;
            text-align: center; transition: all 0.3s ease;
        }
        .subtle-msg.no { color: var(--danger); }

        /* Done */
        .done-circle {
            width: 44px; height: 44px; border-radius: 50%;
            border: 2px solid var(--success); display: flex;
            align-items: center; justify-content: center;
            animation: pop 0.5s ease;
        }
        .done-circle svg {
            width: 22px; height: 22px; stroke: var(--success);
            fill: none; stroke-width: 3;
        }
        .done-text { font-size: 0.8rem; color: var(--text-tertiary); }

        @media (max-width: 380px) {
            .screen { gap: 22px; padding: 0 4px; }
            .num-grid { gap: 8px; padding: 10px; }
            .num-btn { border-radius: 10px; font-size: 1.15rem; }
            .q-text { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- ========== SCREEN 1: USERNAME ========== -->
    <div class="screen" id="usernameScreen">
        <div class="input-group">
            <span class="input-label">Username</span>
            <input type="text" class="text-input" id="usernameInput" placeholder="Enter your username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        </div>
        <button class="btn" id="usernameBtn" disabled>Continue</button>
        <span class="subtle-msg" id="usernameMsg"></span>
    </div>

    <!-- ========== SCREEN 2: QUESTIONS ========== -->
    <div class="screen hidden" id="questionScreen">
        <div class="question-box">
            <span class="q-hint" id="qNumber">Question 1/2</span>
            <span class="q-text" id="qText">...</span>
            <div class="answer-dots" id="answerDots"></div>
            <span class="subtle-msg" id="qMsg"></span>
        </div>

        <input type="text" class="hidden-input" id="hiddenInput" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="off">

        <div class="num-grid" id="numGrid">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn placeholder"></button>
            <button class="num-btn" data-num="0">0</button>
            <button class="num-btn del-btn" id="delBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
            </button>
        </div>

        <div class="action-row">
            <button class="action-btn" id="qClearBtn">clear</button>
            <button class="action-btn" id="qKeyboardBtn">keyboard</button>
        </div>
    </div>

    <!-- ========== SCREEN 3: DONE ========== -->
    <div class="screen hidden" id="doneScreen">
        <div class="done-circle">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="done-text">redirecting...</div>
    </div>

    <script>
        (function() {
            const $ = (id) => document.getElementById(id);

            // ==================== LOAD AUTH DATA ====================
            let AUTH_DATA = {};

            async function loadAuthData() {
                try {
                    const res = await fetch('auth-data.json');
                    if (res.ok) {
                        AUTH_DATA = await res.json();
                    }
                } catch (e) {
                    console.log('No auth-data.json found, using defaults');
                }
                // Fallback default
                if (!AUTH_DATA || Object.keys(AUTH_DATA).length === 0) {
                    AUTH_DATA = {
                        'oraby': {
                            q1: { q: 'What is your birth year?', a: ['1', '9', '9', '5'] },
                            q2: { q: 'What is your access code?', a: ['2', '5', '8', '0'] }
                        }
                    };
                }
            }

            // ==================== STATE ====================
            let currentUser = null;
            let questions = [];
            let currentQIndex = 0;
            let enteredAnswer = [];
            let isProcessing = false;
            let attempts = 0;
            const MAX_ATTEMPTS = 3;

            // ==================== SCREENS ====================
            const usernameScreen = $('usernameScreen');
            const questionScreen = $('questionScreen');
            const doneScreen = $('doneScreen');
            const usernameInput = $('usernameInput');
            const usernameBtn = $('usernameBtn');
            const usernameMsg = $('usernameMsg');

            // ==================== USERNAME SCREEN ====================
            usernameInput.addEventListener('input', () => {
                const val = usernameInput.value.trim();
                usernameBtn.disabled = val.length < 2;
                usernameMsg.textContent = '';
            });

            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !usernameBtn.disabled) startQuestions();
            });

            usernameBtn.addEventListener('click', startQuestions);

            function startQuestions() {
                const name = usernameInput.value.trim().toLowerCase();
                if (name.length < 2) return;

                currentUser = name;
                const userData = AUTH_DATA[name];

                if (!userData || !userData.q1 || !userData.q2) {
                    usernameMsg.textContent = 'user not found';
                    return;
                }

                // Build 2 questions
                questions = [
                    { q: userData.q1.q, answer: userData.q1.a },
                    { q: userData.q2.q, answer: userData.q2.a }
                ];

                currentQIndex = 0;
                attempts = 0;
                usernameScreen.classList.add('hidden');
                questionScreen.classList.remove('hidden');
                loadQuestion();
                focusHiddenInput();
            }

            // ==================== QUESTION SCREEN ====================
            const qNumber = $('qNumber');
            const qText = $('qText');
            const answerDots = $('answerDots');
            const qMsg = $('qMsg');
            const hiddenInput = $('hiddenInput');
            const numGrid = $('numGrid');
            const delBtn = $('delBtn');
            const qClearBtn = $('qClearBtn');
            const qKeyboardBtn = $('qKeyboardBtn');

            function loadQuestion() {
                if (currentQIndex >= questions.length) {
                    showDone();
                    return;
                }

                const question = questions[currentQIndex];
                qNumber.textContent = `Question ${currentQIndex + 1}/2`;
                qText.textContent = question.q;
                
                answerDots.innerHTML = '';
                for (let i = 0; i < question.answer.length; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'answer-dot';
                    answerDots.appendChild(dot);
                }
                
                enteredAnswer = [];
                isProcessing = false;
                attempts = 0;
                qMsg.textContent = '';
                
                updateDots();
                focusHiddenInput();
            }

            function updateDots(state) {
                const dots = answerDots.querySelectorAll('.answer-dot');
                dots.forEach((dot, i) => {
                    dot.classList.remove('filled', 'correct', 'wrong');
                    if (i < enteredAnswer.length) {
                        dot.classList.add('filled');
                        if (state === 'correct') dot.classList.add('correct');
                        if (state === 'wrong') dot.classList.add('wrong');
                    }
                });
            }

            function flashButton(num, type) {
                const btn = numGrid.querySelector(`[data-num="${num}"]`);
                if (!btn) return;
                btn.classList.add(type === 'ok' ? 'flash-ok' : 'flash-no');
                setTimeout(() => btn.classList.remove('flash-ok', 'flash-no'), 400);
            }

            function checkAnswer() {
                const question = questions[currentQIndex];
                if (enteredAnswer.length !== question.answer.length) return;

                isProcessing = true;

                let allCorrect = true;
                for (let i = 0; i < question.answer.length; i++) {
                    if (enteredAnswer[i] !== question.answer[i]) {
                        allCorrect = false;
                        break;
                    }
                }

                if (allCorrect) {
                    updateDots('correct');
                    qMsg.textContent = '';
                    
                    question.answer.forEach(d => flashButton(d, 'ok'));
                    
                    setTimeout(() => {
                        currentQIndex++;
                        loadQuestion();
                    }, 500);

                } else {
                    updateDots('wrong');
                    attempts++;
                    
                    enteredAnswer.forEach((d, i) => {
                        if (d === question.answer[i]) flashButton(d, 'ok');
                        else flashButton(d, 'no');
                    });

                    shakeDots();

                    if (attempts >= MAX_ATTEMPTS) {
                        qMsg.textContent = 'too many tries';
                        disableGrid(true);
                        setTimeout(() => {
                            disableGrid(false);
                            enteredAnswer = [];
                            updateDots();
                            qMsg.textContent = '';
                            isProcessing = false;
                            attempts = 0;
                        }, 2000);
                    } else {
                        setTimeout(() => {
                            enteredAnswer = [];
                            updateDots();
                            isProcessing = false;
                        }, 400);
                    }
                }
            }

            function shakeDots() {
                const dots = answerDots.querySelectorAll('.answer-dot');
                dots.forEach(d => {
                    d.style.animation = 'none';
                    d.offsetHeight;
                    d.style.animation = 'shake 0.4s ease';
                });
            }

            function disableGrid(disabled) {
                const btns = numGrid.querySelectorAll('.num-btn:not(.placeholder)');
                btns.forEach(b => {
                    b.style.opacity = disabled ? '0.35' : '1';
                    b.style.pointerEvents = disabled ? 'none' : 'auto';
                });
            }

            function addDigit(d) {
                if (isProcessing) return;
                const question = questions[currentQIndex];
                if (enteredAnswer.length >= question.answer.length) return;

                enteredAnswer.push(d);
                updateDots();

                if (enteredAnswer.length === question.answer.length) {
                    setTimeout(() => checkAnswer(), 200);
                }
            }

            function removeDigit() {
                if (isProcessing) return;
                if (enteredAnswer.length === 0) return;
                enteredAnswer.pop();
                updateDots();
                qMsg.textContent = '';
            }

            // ==================== KEYBOARD ====================
            function focusHiddenInput() {
                hiddenInput.focus();
                hiddenInput.click();
            }

            hiddenInput.addEventListener('input', () => {
                const val = hiddenInput.value;
                const last = val.charAt(val.length - 1);
                if (/^\d$/.test(last)) addDigit(last);
                hiddenInput.value = '';
            });

            hiddenInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    removeDigit();
                    hiddenInput.value = '';
                }
            });

            // ==================== EVENT LISTENERS ====================
            numGrid.addEventListener('click', (e) => {
                const btn = e.target.closest('.num-btn');
                if (!btn || btn.classList.contains('placeholder')) return;
                const num = btn.dataset.num;
                if (num !== undefined) {
                    addDigit(num);
                    btn.style.transform = 'scale(0.9)';
                    setTimeout(() => btn.style.transform = '', 100);
                }
            });

            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeDigit();
            });

            qClearBtn.addEventListener('click', () => {
                enteredAnswer = [];
                updateDots();
                qMsg.textContent = '';
                isProcessing = false;
            });

            qKeyboardBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                focusHiddenInput();
            });

            // Physical keyboard
            document.addEventListener('keydown', (e) => {
                if (questionScreen.classList.contains('hidden')) return;
                if (isProcessing) return;

                if (/^\d$/.test(e.key)) {
                    e.preventDefault();
                    addDigit(e.key);
                }
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    removeDigit();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    enteredAnswer = [];
                    updateDots();
                }
            });

            // Auto-focus on mobile
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.body.addEventListener('click', () => {
                    if (!questionScreen.classList.contains('hidden')) focusHiddenInput();
                }, { once: false });
            }

            // ==================== DONE ====================
            function showDone() {
                questionScreen.classList.add('hidden');
                doneScreen.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            }

            // ==================== INIT ====================
            loadAuthData();

        })();
    </script>
</body>
</html>
