<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Access</title>
    <meta name="theme-color" content="#f4f2ee">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --bg: #f4f2ee;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #191919;
            --text-secondary: #595856;
            --text-tertiary: #868482;
            --primary: #6c47ff;
            --primary-hover: #5835e8;
            --success: #057642;
            --danger: #d11124;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font); background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased; user-select: none;
            -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 20px;
        }

        .screen {
            width: 100%; max-width: 340px; display: flex;
            flex-direction: column; align-items: center; gap: 28px;
            animation: fadeIn 0.35s ease;
        }
        .screen.hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .input-label {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--text-tertiary); text-align: center;
        }

        .text-input {
            width: 100%; padding: 14px 18px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: var(--text); font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease; text-align: center;
        }
        .text-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
        .text-input::placeholder { color: #b0b0b0; }

        .password-wrap { width: 100%; position: relative; }
        .password-input {
            width: 100%; padding: 14px 18px; border-radius: 14px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: transparent; font-size: 1rem; font-family: var(--font);
            outline: none; transition: all 0.2s ease; text-align: center;
            caret-color: var(--primary); position: relative; z-index: 2;
        }
        .password-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }
        .password-input::placeholder { color: #b0b0b0; }
        .emoji-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.4rem; letter-spacing: 4px; pointer-events: none; z-index: 1;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            font-weight: 600; font-size: 0.9rem; font-family: var(--font);
            cursor: pointer; transition: all 0.2s ease; background: var(--primary);
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }

        .q-hint { font-size: 0.62rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1.5px; }
        .q-text { font-size: 1.05rem; font-weight: 600; color: var(--text); text-align: center; line-height: 1.45; padding: 0 8px; }

        .msg { font-size: 0.7rem; font-weight: 500; min-height: 16px; text-align: center; transition: all 0.3s ease; }
        .msg.red { color: var(--danger); }
        .msg.green { color: var(--success); }

        /* Game - minimal */
        .game-area {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 50;
        }
        .game-emoji {
            font-size: 5rem; cursor: pointer; position: absolute;
            animation: popIn 0.3s ease; transition: opacity 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .game-emoji:active { transform: scale(0.85); }
        .game-emoji.hidden { opacity: 0; pointer-events: none; }
        @keyframes popIn { 0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1} }

        .done-circle {
            width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--success);
            display: flex; align-items: center; justify-content: center;
        }
        .done-circle svg { width: 22px; height: 22px; stroke: var(--success); fill: none; stroke-width: 3; }
        .done-text { font-size: 0.8rem; color: var(--text-tertiary); }

        @media (max-width: 380px) {
            .screen { gap: 22px; padding: 0 4px; max-width: 100%; }
            .q-text { font-size: 0.9rem; }
            .game-emoji { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <!-- ========== USERNAME ========== -->
    <div class="screen" id="usernameScreen">
        <span class="input-label">Username</span>
        <input type="text" class="text-input" id="usernameInput" placeholder="Enter your username" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn" id="usernameBtn" disabled>Continue</button>
        <span class="msg" id="usernameMsg"></span>
    </div>

    <!-- ========== QUESTIONS ========== -->
    <div class="screen hidden" id="questionScreen">
        <span class="q-hint" id="qNumber">Question 1/2</span>
        <span class="q-text" id="qText">...</span>
        <div class="password-wrap">
            <div class="emoji-overlay" id="emojiOverlay"></div>
            <input type="password" class="password-input" id="answerInput" placeholder="Type your answer" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <span class="msg" id="qMsg"></span>
        <button class="btn" id="submitAnswer">Submit</button>
    </div>

    <!-- ========== GAME ========== -->
    <div class="game-area hidden" id="gameArea">
        <div class="game-emoji" id="gameEmoji">🤪</div>
    </div>

    <!-- ========== DONE ========== -->
    <div class="screen hidden" id="doneScreen">
        <div class="done-circle">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="done-text">redirecting...</div>
    </div>

    <script>
        (function() {
            const $ = id => document.getElementById(id);
            const FAIL_IMAGE = 'https://i.pinimg.com/736x/57/a1/db/57a1db5bc5af78df0b5e0aa228678206.jpg';
            const EMOJI = '🤪';

            // ==================== AUTH DATA ====================
            let AUTH_DATA = { users: [] };
            async function loadAuthData() {
                try { const r = await fetch('auth-data.json'); if (r.ok) { const d = await r.json(); if (d?.users) AUTH_DATA = d; } } catch(e) {}
            }
            function findUser(u) { return AUTH_DATA.users.find(x => x.username.toLowerCase() === u.trim().toLowerCase()) || null; }

            // ==================== STATE ====================
            let currentUser = null, questions = [], currentQIndex = 0, attempts = 0;
            const MAX_ATTEMPTS = 3;

            // Pattern: click, click, skip, click, click
            const PATTERN = ['click','click','skip','click','click'];
            let gameRound = 0, gameTimer = null;

            // ==================== SCREENS ====================
            const usernameScreen = $('usernameScreen'), questionScreen = $('questionScreen');
            const gameArea = $('gameArea'), doneScreen = $('doneScreen');
            const usernameInput = $('usernameInput'), usernameBtn = $('usernameBtn'), usernameMsg = $('usernameMsg');

            // ==================== USERNAME ====================
            usernameInput.addEventListener('input', () => { usernameBtn.disabled = usernameInput.value.trim().length < 2; usernameMsg.textContent = ''; usernameMsg.className = 'msg'; });
            usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !usernameBtn.disabled) startQuestions(); });
            usernameBtn.addEventListener('click', startQuestions);

            function startQuestions() {
                const name = usernameInput.value.trim().toLowerCase();
                if (name.length < 2) return;
                const user = findUser(name);
                if (!user) { usernameMsg.textContent = 'username not found'; usernameMsg.className = 'msg red'; return; }
                currentUser = user;
                questions = [{ q: user.question1, a: user.answer1 }, { q: user.question2, a: user.answer2 }];
                currentQIndex = 0; attempts = 0;
                usernameScreen.classList.add('hidden'); questionScreen.classList.remove('hidden');
                loadQuestion();
            }
            function fail() { window.location.href = FAIL_IMAGE; }
            function win() { gameArea.classList.add('hidden'); doneScreen.classList.remove('hidden'); setTimeout(() => { window.location.href = 'home.html'; }, 1000); }

            // ==================== QUESTIONS ====================
            const qNumber = $('qNumber'), qText = $('qText'), answerInput = $('answerInput');
            const emojiOverlay = $('emojiOverlay'), qMsg = $('qMsg'), submitAnswer = $('submitAnswer');

            function loadQuestion() {
                if (currentQIndex >= 2) { startGame(); return; }
                const q = questions[currentQIndex];
                qNumber.textContent = `Question ${currentQIndex + 1}/2`;
                qText.textContent = q.q;
                answerInput.value = ''; emojiOverlay.textContent = '';
                qMsg.textContent = ''; qMsg.className = 'msg';
                attempts = 0; answerInput.focus();
            }
            answerInput.addEventListener('input', () => { emojiOverlay.textContent = EMOJI.repeat(answerInput.value.length); });
            answerInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); } });
            submitAnswer.addEventListener('click', checkAnswer);

            function checkAnswer() {
                const q = questions[currentQIndex], ans = answerInput.value.trim();
                if (!ans) return;
                if (ans === q.a) {
                    qMsg.textContent = 'correct'; qMsg.className = 'msg green';
                    emojiOverlay.textContent = '🎉';
                    setTimeout(() => { currentQIndex++; loadQuestion(); }, 400);
                } else {
                    attempts++; qMsg.textContent = 'wrong answer'; qMsg.className = 'msg red';
                    emojiOverlay.textContent = '❌';
                    if (attempts >= MAX_ATTEMPTS) { emojiOverlay.textContent = '💀'; setTimeout(fail, 600); return; }
                    setTimeout(() => { answerInput.value = ''; emojiOverlay.textContent = ''; qMsg.textContent = ''; qMsg.className = 'msg'; answerInput.focus(); }, 400);
                }
            }

            // ==================== GAME ====================
            const gameEmoji = $('gameEmoji');

            function startGame() {
                questionScreen.classList.add('hidden');
                gameArea.classList.remove('hidden');
                gameRound = 0;
                nextRound();
            }

            function nextRound() {
                if (gameRound >= 5) { win(); return; }
                const x = 40 + Math.random() * 20; // 40-60%
                const y = 35 + Math.random() * 30; // 35-65%
                gameEmoji.style.left = x + '%';
                gameEmoji.style.top = y + '%';
                gameEmoji.classList.remove('hidden');
                gameEmoji.style.animation = 'none'; gameEmoji.offsetHeight; gameEmoji.style.animation = 'popIn 0.3s ease';

                clearTimeout(gameTimer);
                gameTimer = setTimeout(() => {
                    if (gameRound < 5) handleRound('timeout');
                }, 1800);
            }

            gameEmoji.addEventListener('click', () => {
                if (gameRound >= 5) return;
                clearTimeout(gameTimer);
                handleRound('click');
            });

            function handleRound(action) {
                const expected = PATTERN[gameRound];
                let ok = false;
                if (expected === 'click' && action === 'click') ok = true;
                if (expected === 'skip' && action === 'timeout') ok = true;

                gameEmoji.classList.add('hidden');
                gameRound++;

                if (ok) {
                    nextRound();
                } else {
                    fail();
                }
            }

            loadAuthData();
        })();
    </script>
</body>
</html>
