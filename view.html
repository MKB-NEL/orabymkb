<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VaultDrop · Preview</title>
    <meta name="theme-color" content="#6c47ff">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font-family);
            background: #1a1a1a;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* Full-page preview area */
        .preview-fullscreen {
            width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #1a1a1a;
        }

        .preview-fullscreen iframe,
        .preview-fullscreen img,
        .preview-fullscreen video,
        .preview-fullscreen .text-content {
            width: 100%; height: 100%;
            border: none; object-fit: contain;
        }

        .preview-fullscreen .text-content {
            padding: 2rem; overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.875rem; line-height: 1.6;
            white-space: pre-wrap; color: #e0e0e0;
            text-align: left;
        }

        .csv-table-wrap {
            width: 100%; height: 100%; overflow: auto;
            padding: 1rem;
        }
        .csv-table {
            width: 100%; border-collapse: collapse;
            font-size: 0.8125rem; color: #e0e0e0;
        }
        .csv-table th {
            background: #333; padding: 10px 14px;
            text-align: left; font-weight: 600;
            position: sticky; top: 0; z-index: 1;
            border-bottom: 2px solid #555;
        }
        .csv-table td {
            padding: 8px 14px; border-bottom: 1px solid #333;
        }
        .csv-table tr:hover td { background: #2a2a2a; }

        .audio-wrap {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }
        .audio-wrap audio { width: 80%; max-width: 500px; }

        /* Corner info box */
        .corner-info {
            position: fixed; bottom: 16px; left: 16px;
            background: rgba(30, 30, 30, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px; padding: 12px 16px;
            display: flex; align-items: center; gap: 12px;
            z-index: 100; max-width: calc(100vw - 32px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            transition: all var(--transition-fast);
        }

        .corner-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .corner-icon.pdf { background: #fce4ec; color: #c62828; }
        .corner-icon.word { background: #e3f2fd; color: #1565c0; }
        .corner-icon.excel { background: #e8f5e9; color: #2e7d32; }
        .corner-icon.ppt { background: #fff3e0; color: #e65100; }
        .corner-icon.txt, .corner-icon.csv, .corner-icon.md, .corner-icon.rtf,
        .corner-icon.json, .corner-icon.xml, .corner-icon.log { background: #f5f5f5; color: #424242; }
        .corner-icon.image { background: #e8eaf6; color: #283593; }
        .corner-icon.video { background: #fce4ec; color: #880e4f; }
        .corner-icon.audio { background: #e8f5e9; color: #1b5e20; }
        .corner-icon.other { background: #eceff1; color: #455a64; }

        .corner-details { min-width: 0; }
        .corner-name {
            font-size: 0.8rem; font-weight: 600; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 200px; margin-bottom: 2px;
        }
        .corner-meta {
            font-size: 0.65rem; color: #aaa; display: flex;
            align-items: center; gap: 6px;
        }
        .corner-subject {
            display: inline-block; padding: 1px 8px; border-radius: 10px;
            font-size: 0.6rem; font-weight: 600; background: rgba(108, 71, 255, 0.25);
            color: #b4a5ff; margin-top: 3px; max-width: 180px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .corner-actions {
            display: flex; gap: 6px; flex-shrink: 0;
        }
        .corner-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #ccc; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 16px; transition: all var(--transition-fast);
        }
        .corner-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff; border-color: rgba(255, 255, 255, 0.35);
        }
        .corner-btn.primary {
            background: #6c47ff; border-color: #6c47ff; color: #fff;
        }
        .corner-btn.primary:hover { background: #7b5ce8; }

        .corner-close {
            position: absolute; top: -8px; right: -8px;
            width: 22px; height: 22px; border-radius: 50%;
            background: #444; border: none; color: #ccc;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 14px;
            opacity: 0; transition: all var(--transition-fast);
        }
        .corner-info:hover .corner-close { opacity: 1; }
        .corner-close:hover { background: #e53935; color: #fff; }

        .corner-info.minimized .corner-details,
        .corner-info.minimized .corner-actions { display: none; }
        .corner-info.minimized { padding: 8px; border-radius: 50%; cursor: pointer; }
        .corner-info.minimized .corner-close { opacity: 1; top: -4px; right: -4px; }

        /* Toast */
        .toast-container {
            position: fixed; bottom: 90px; left: 16px;
            z-index: 200; display: flex; flex-direction: column; gap: 6px;
            max-width: 320px;
        }
        .toast {
            padding: 10px 14px; border-radius: 8px; font-size: 0.75rem;
            font-weight: 500; animation: toastIn 0.3s ease;
            background: #333; color: #fff; border: 1px solid #555;
        }
        .toast.success { background: #0d3b1e; border-color: #22c55e; color: #86efac; }
        .toast.error { background: #3b0d0d; border-color: #ef4444; color: #fca5a5; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .corner-info {
                bottom: 10px; left: 8px; right: 8px;
                padding: 10px 12px; gap: 8px;
                border-radius: 10px;
            }
            .corner-icon { width: 32px; height: 32px; font-size: 18px; border-radius: 8px; }
            .corner-name { font-size: 0.72rem; max-width: 120px; }
            .corner-meta { font-size: 0.6rem; }
            .corner-btn { width: 28px; height: 28px; font-size: 14px; border-radius: 6px; }
            .corner-actions { gap: 4px; }
        }
    </style>
</head>
<body>
    <!-- Full-screen preview -->
    <div class="preview-fullscreen" id="previewArea">
        <div style="text-align:center;color:#888;">
            <div style="width:32px;height:32px;border:3px solid #444;border-top-color:#6c47ff;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px;"></div>
            Loading preview...
        </div>
    </div>

    <!-- Corner info box -->
    <div class="corner-info" id="cornerInfo" style="display:none;">
        <button class="corner-close" id="cornerClose" title="Close panel">×</button>
        <div class="corner-icon" id="cornerIcon"><i class="bx bx-file"></i></div>
        <div class="corner-details">
            <div class="corner-name" id="cornerName">file.txt</div>
            <div class="corner-meta">
                <span id="cornerType">Text</span>
                <span>·</span>
                <span id="cornerSize">0 B</span>
            </div>
            <div class="corner-subject" id="cornerSubject" style="display:none;"></div>
        </div>
        <div class="corner-actions">
            <button class="corner-btn primary" id="btnDownload" title="Download"><i class="bx bx-download"></i></button>
            <button class="corner-btn" id="btnOpenRaw" title="Open Raw"><i class="bx bx-open-in-new"></i></button>
            <button class="corner-btn" id="btnCopy" title="Copy Link"><i class="bx bx-link"></i></button>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // ==================== CONFIGURATION ====================
            const SUPABASE_URL = "https://kdrgdnrwibuqpvikjapx.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkcmdkbnJ3aWJ1cXB2aWtqYXB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjE4ODMsImV4cCI6MjA5NjkzNzg4M30.9wEbcIDziq9xDWZQ_BF0X-p25g4SQkuCCQV-5fhDnbY";
            const STORAGE_BUCKET = "exams";
            
            let supabase;
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: { persistSession: false, autoRefreshToken: false },
                });
            } catch (e) { console.error('Supabase init:', e); }
            
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file') || '';
            const fileUrl = urlParams.get('url') || '';
            const fileSubject = urlParams.get('subject') || '';
            
            // ==================== HELPERS ====================
            function $(id) { return document.getElementById(id); }
            
            function formatSize(bytes) {
                if (!bytes || bytes === 0) return '0 B';
                const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }
            
            function getExt(fn) { return (fn || '').split('.').pop().toLowerCase(); }
            
            function getCategory(fn) {
                const ext = getExt(fn);
                const docs = ['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','md','rtf','odt','ods','odp','json','xml','yml','yaml','log','ini','cfg','conf'];
                const images = ['jpg','jpeg','png','gif','svg','webp','bmp','ico','heic','heif','tiff'];
                const videos = ['mp4','avi','mov','wmv','flv','mkv','webm','m4v','3gp'];
                const audios = ['mp3','wav','ogg','aac','flac','m4a'];
                if (docs.includes(ext)) return ext;
                if (images.includes(ext)) return 'image';
                if (videos.includes(ext)) return 'video';
                if (audios.includes(ext)) return 'audio';
                return 'other';
            }
            
            function getIcon(fn) {
                const c = getCategory(fn);
                const map = {
                    'pdf':'bx bxs-file-pdf','doc':'bx bxs-file-doc','docx':'bx bxs-file-doc',
                    'xls':'bx bx-spreadsheet','xlsx':'bx bx-spreadsheet',
                    'ppt':'bx bxs-slideshow','pptx':'bx bxs-slideshow',
                    'txt':'bx bx-text','csv':'bx bx-spreadsheet','md':'bx bx-text',
                    'rtf':'bx bx-text','json':'bx bx-code','xml':'bx bx-code',
                    'image':'bx bx-image-alt','video':'bx bx-video','audio':'bx bx-music'
                };
                return map[c] || 'bx bx-file-blank';
            }
            
            function typeLabel(fn) {
                const ext = getExt(fn);
                const labels = {
                    'pdf':'PDF','doc':'Word','docx':'Word','xls':'Excel','xlsx':'Excel',
                    'ppt':'PowerPoint','pptx':'PowerPoint','txt':'Text','csv':'CSV',
                    'md':'Markdown','rtf':'Rich Text','json':'JSON','xml':'XML',
                    'jpg':'JPEG','jpeg':'JPEG','png':'PNG','gif':'GIF','svg':'SVG',
                    'webp':'WebP','mp4':'MP4','mkv':'MKV','webm':'WebM',
                    'mp3':'MP3','wav':'WAV','ogg':'OGG','zip':'ZIP','rar':'RAR'
                };
                return labels[ext] || ext.toUpperCase();
            }
            
            function esc(s) {
                const d = document.createElement('div');
                d.textContent = s || '';
                return d.innerHTML;
            }
            
            function showToast(msg, type) {
                const t = document.createElement('div');
                t.className = 'toast ' + (type || 'success');
                t.textContent = msg;
                $('toastContainer').appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
            }
            
            function getPublicUrl(fn) {
                if (!supabase) return fileUrl || '';
                const { data } = supabase.storage.from(STORAGE_BUCKET).getPublicUrl(fn);
                return data?.publicUrl || fileUrl || '';
            }
            
            // ==================== CORNER INFO ====================
            function updateCornerInfo(metadata) {
                const cat = getCategory(fileName);
                const icon = getIcon(fileName);
                const size = metadata?.metadata?.size || 0;
                const type = typeLabel(fileName);
                
                $('cornerIcon').className = 'corner-icon ' + (['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','md','rtf','json','xml'].includes(cat) ? cat : cat);
                $('cornerIcon').innerHTML = '<i class="' + icon + '"></i>';
                $('cornerName').textContent = fileName;
                $('cornerName').title = fileName;
                $('cornerType').textContent = type;
                $('cornerSize').textContent = formatSize(size);
                
                if (fileSubject) {
                    $('cornerSubject').style.display = 'inline-block';
                    $('cornerSubject').textContent = fileSubject;
                }
                
                $('cornerInfo').style.display = 'flex';
            }
            
            // ==================== PREVIEW ====================
            function renderPreview(metadata) {
                const ext = getExt(fileName);
                const cat = getCategory(fileName);
                const url = getPublicUrl(fileName);
                const area = $('previewArea');
                
                const textTypes = ['txt','md','rtf','log','json','xml','yml','yaml','ini','cfg','conf'];
                const googleTypes = ['pdf','doc','docx','xls','xlsx','ppt','pptx','odt','ods','odp'];
                const imageTypes = ['jpg','jpeg','png','gif','svg','webp','bmp','ico'];
                const videoTypes = ['mp4','webm','ogg','mov'];
                const audioTypes = ['mp3','wav','ogg','aac','flac'];
                
                if (textTypes.includes(ext)) {
                    renderTextPreview(area, url, ext);
                } else if (ext === 'csv') {
                    renderCsvPreview(area, url);
                } else if (googleTypes.includes(ext)) {
                    renderGooglePreview(area, url, ext);
                } else if (imageTypes.includes(ext)) {
                    area.innerHTML = '<img src="' + url + '" alt="' + esc(fileName) + '" style="width:100%;height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML=\'<div style=text-align:center;color:#888;padding:2rem;><i class=bx bx-error-circle style=font-size:48px;display:block;margin-bottom:12px;></i><p>Image could not be loaded</p></div>\'">';
                } else if (videoTypes.includes(ext)) {
                    area.innerHTML = '<video controls style="width:100%;height:100%;object-fit:contain;"><source src="' + url + '" type="video/' + ext + '"></video>';
                } else if (audioTypes.includes(ext)) {
                    area.innerHTML = '<div class="audio-wrap"><audio controls><source src="' + url + '" type="audio/' + ext + '"></audio></div>';
                } else {
                    area.innerHTML = '<div style="text-align:center;color:#888;padding:2rem;"><i class="bx bx-file-blank" style="font-size:64px;display:block;margin-bottom:16px;"></i><p style="font-size:1rem;margin-bottom:8px;">Preview not available</p><p style="font-size:0.8rem;">Use the buttons below to download or open this file.</p></div>';
                }
            }
            
            async function renderTextPreview(area, url, ext) {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Failed to load');
                    let text = await res.text();
                    
                    if (ext === 'json') {
                        try { text = JSON.stringify(JSON.parse(text), null, 2); } catch(e) {}
                    }
                    
                    area.innerHTML = '<div class="text-content">' + esc(text) + '</div>';
                } catch(e) {
                    area.innerHTML = '<div style="text-align:center;color:#888;padding:2rem;"><i class="bx bx-error-circle" style="font-size:48px;display:block;margin-bottom:12px;"></i><p>Could not load file</p></div>';
                }
            }
            
            async function renderCsvPreview(area, url) {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('Failed to load');
                    const text = await res.text();
                    const lines = text.trim().split('\n');
                    if (lines.length === 0) throw new Error('Empty');
                    
                    const parseLine = (line) => {
                        const r = []; let c = '', q = false;
                        for (let i = 0; i < line.length; i++) {
                            const ch = line[i];
                            if (q) { if (ch === '"') { if (line[i+1]==='"') { c+='"'; i++; } else q=false; } else c+=ch; }
                            else { if (ch==='"') q=true; else if (ch===',') { r.push(c.trim()); c=''; } else c+=ch; }
                        }
                        r.push(c.trim()); return r;
                    };
                    
                    const headers = parseLine(lines[0]);
                    const rows = lines.slice(1).map(parseLine);
                    
                    let html = '<div class="csv-table-wrap"><table class="csv-table"><thead><tr>';
                    headers.forEach(h => html += '<th>' + esc(h) + '</th>');
                    html += '</tr></thead><tbody>';
                    rows.forEach(row => {
                        html += '<tr>';
                        headers.forEach((_, i) => html += '<td>' + esc(row[i] || '') + '</td>');
                        html += '</tr>';
                    });
                    html += '</tbody></table></div>';
                    area.innerHTML = html;
                } catch(e) {
                    area.innerHTML = '<div style="text-align:center;color:#888;padding:2rem;"><p>Could not parse CSV</p></div>';
                }
            }
            
            function renderGooglePreview(area, url, ext) {
                if (ext === 'pdf') {
                    area.innerHTML = '<iframe src="' + url + '#toolbar=0&navpanes=0" style="width:100%;height:100%;border:none;"></iframe>';
                } else {
                    const gUrl = 'https://docs.google.com/viewer?url=' + encodeURIComponent(url) + '&embedded=true';
                    area.innerHTML = '<iframe src="' + gUrl + '" style="width:100%;height:100%;border:none;"></iframe>';
                }
            }
            
            // ==================== ACTIONS ====================
            async function copyUrl() {
                try {
                    await navigator.clipboard.writeText(getPublicUrl(fileName));
                    showToast('Link copied!', 'success');
                } catch(e) {
                    showToast('Copy failed', 'error');
                }
            }
            
            async function downloadFile() {
                if (!supabase) return;
                try {
                    const { data, error } = await supabase.storage.from(STORAGE_BUCKET).download(fileName);
                    if (error) throw error;
                    const url = URL.createObjectURL(data);
                    const a = document.createElement('a');
                    a.href = url; a.download = fileName;
                    document.body.appendChild(a); a.click();
                    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
                    showToast('Downloaded!', 'success');
                } catch(e) {
                    showToast('Download failed', 'error');
                }
            }
            
            // ==================== INIT ====================
            async function init() {
                if (!fileName) {
                    $('previewArea').innerHTML = '<div style="text-align:center;color:#888;padding:2rem;"><i class="bx bx-error-circle" style="font-size:48px;display:block;margin-bottom:12px;"></i><p>No file specified</p></div>';
                    return;
                }
                
                // Fetch metadata
                let metadata = null;
                if (supabase) {
                    try {
                        const { data, error } = await supabase.storage.from(STORAGE_BUCKET).list('', { limit: 200 });
                        if (!error) {
                            const files = (data || []).filter(f => f.name === fileName);
                            if (files.length > 0) metadata = files[0];
                        }
                    } catch(e) {}
                }
                
                updateCornerInfo(metadata);
                renderPreview(metadata);
                
                // Button handlers
                $('btnDownload').onclick = downloadFile;
                $('btnOpenRaw').onclick = () => window.open(getPublicUrl(fileName), '_blank');
                $('btnCopy').onclick = copyUrl;
                
                // Corner close/minimize
                let minimized = false;
                $('cornerClose').onclick = (e) => {
                    e.stopPropagation();
                    if (minimized) {
                        $('cornerInfo').style.display = 'none';
                    } else {
                        minimized = true;
                        $('cornerInfo').classList.add('minimized');
                    }
                };
                $('cornerInfo').onclick = () => {
                    if (minimized) {
                        minimized = false;
                        $('cornerInfo').classList.remove('minimized');
                    }
                };
            }
            
            init();
        })();
    </script>
</body>
</html>
