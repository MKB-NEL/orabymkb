<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OrabyMKB · Preview</title>
    <meta name="theme-color" content="#0d0d0d">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: var(--font); background: #0d0d0d; color: #e0e0e0;
            -webkit-font-smoothing: antialiased;
        }

        /* ==================== LAYOUT ==================== */
        .viewer-layout {
            display: flex; width: 100%; height: 100vh;
        }

        /* Left panel - group files list */
        .group-panel {
            width: 240px; min-width: 240px; background: #111118;
            border-right: 1px solid #1e1e2e; display: flex;
            flex-direction: column; overflow: hidden;
            transition: transform var(--transition-fast);
        }
        .group-panel-header {
            padding: 14px 16px; border-bottom: 1px solid #1e1e2e;
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0;
        }
        .group-panel-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: #e8f5e9; color: #2e7d32;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .group-panel-title {
            font-size: 0.8rem; font-weight: 700; color: #e0e0e0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .group-panel-count {
            font-size: 0.65rem; color: #666; flex-shrink: 0;
        }
        .group-panel-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .group-panel-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 10px;
            cursor: pointer; transition: all var(--transition-fast);
            border: 1px solid transparent;
        }
        .group-panel-item:hover { background: #1a1a28; }
        .group-panel-item.active {
            background: #1a1a30; border-color: #6c47ff;
        }
        .panel-item-icon {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .panel-item-icon.pdf { background: #fce4ec; color: #c62828; }
        .panel-item-icon.word { background: #e3f2fd; color: #1565c0; }
        .panel-item-icon.excel { background: #e8f5e9; color: #2e7d32; }
        .panel-item-icon.ppt { background: #fff3e0; color: #e65100; }
        .panel-item-icon.txt { background: #f5f5f5; color: #424242; }
        .panel-item-icon.image { background: #e8eaf6; color: #283593; }
        .panel-item-icon.video { background: #fce4ec; color: #880e4f; }
        .panel-item-icon.audio { background: #e0f2f1; color: #004d40; }
        .panel-item-icon.other { background: #eceff1; color: #455a64; }
        .panel-item-name {
            flex: 1; font-size: 0.72rem; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            color: #ccc;
        }
        .panel-item.active .panel-item-name { color: #fff; }
        .panel-toggle {
            position: absolute; top: 12px; left: 12px;
            width: 34px; height: 34px; border-radius: 8px;
            background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.12);
            color: #ccc; cursor: pointer; display: none; align-items: center;
            justify-content: center; font-size: 18px; z-index: 100;
        }

        /* Main preview area */
        .preview-main {
            flex: 1; display: flex; flex-direction: column;
            min-width: 0; position: relative;
        }

        /* Full-page preview */
        .preview-fullscreen {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #0d0d0d; position: relative;
        }
        .preview-fullscreen iframe { width: 100%; height: 100%; border: none; }
        .preview-fullscreen img {
            max-width: 100%; max-height: 100%; object-fit: contain;
            cursor: zoom-in; transition: transform 0.3s ease;
        }
        .preview-fullscreen img.zoomed { cursor: zoom-out; transform: scale(2.5); }
        .preview-fullscreen video { max-width: 100%; max-height: 100%; object-fit: contain; outline: none; }
        .preview-fullscreen .text-content {
            width: 100%; height: 100%; padding: 2rem; overflow-y: auto;
            font-family: 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.85rem; line-height: 1.7; white-space: pre-wrap;
            color: #d4d4d4; text-align: left;
        }
        .csv-table-wrap { width: 100%; height: 100%; overflow: auto; padding: 1rem; }
        .csv-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #d4d4d4; }
        .csv-table th { background: #1a1a1a; padding: 10px 14px; text-align: left; font-weight: 600; border-bottom: 2px solid #444; position: sticky; top: 0; }
        .csv-table td { padding: 8px 14px; border-bottom: 1px solid #1a1a1a; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .csv-table tr:hover td { background: #1a1a1a; }
        .audio-wrap { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .audio-wrap audio { width: 80%; max-width: 500px; }

        .unsupported-wrap { text-align: center; padding: 2rem; color: #888; }
        .unsupported-wrap i { font-size: 64px; display: block; margin-bottom: 16px; opacity: 0.5; }
        .unsupported-wrap h3 { font-size: 1rem; margin-bottom: 8px; color: #ccc; }
        .unsupported-wrap p { font-size: 0.8rem; }

        /* Corner info */
        .corner-info {
            position: absolute; top: 12px; right: 12px;
            background: rgba(20,20,20,0.92); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 10px 14px; display: flex; align-items: center; gap: 10px;
            z-index: 50; max-width: calc(100% - 24px);
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .corner-icon {
            width: 34px; height: 34px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .corner-icon.pdf { background: #fce4ec; color: #c62828; }
        .corner-icon.word { background: #e3f2fd; color: #1565c0; }
        .corner-icon.excel { background: #e8f5e9; color: #2e7d32; }
        .corner-icon.ppt { background: #fff3e0; color: #e65100; }
        .corner-icon.txt { background: #f5f5f5; color: #424242; }
        .corner-icon.image { background: #e8eaf6; color: #283593; }
        .corner-icon.video { background: #fce4ec; color: #880e4f; }
        .corner-icon.audio { background: #e0f2f1; color: #004d40; }
        .corner-icon.other { background: #eceff1; color: #455a64; }
        .corner-details { min-width: 0; }
        .corner-name { font-size: 0.75rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .corner-meta { font-size: 0.6rem; color: #999; }
        .corner-actions { display: flex; gap: 5px; flex-shrink: 0; }
        .corner-btn {
            width: 28px; height: 28px; border-radius: 7px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
            color: #bbb; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 14px; transition: all var(--transition-fast);
        }
        .corner-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .corner-btn.primary { background: #6c47ff; border-color: #6c47ff; color: #fff; }
        .corner-btn.primary:hover { background: #7b5ce8; }

        /* Loading */
        .loading-indicator { text-align: center; color: #666; }
        .loading-spinner {
            width: 32px; height: 32px; border: 3px solid #2a2a2a;
            border-top-color: #6c47ff; border-radius: 50%;
            animation: spin 0.7s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast-container {
            position: fixed; top: 60px; right: 12px; z-index: 200;
            display: flex; flex-direction: column; gap: 6px; max-width: 280px;
        }
        .toast {
            padding: 10px 14px; border-radius: 8px; font-size: 0.72rem;
            font-weight: 500; animation: toastIn 0.3s ease;
            background: #1a1a1a; color: #e0e0e0; border: 1px solid #333;
        }
        .toast.success { background: #0a2a10; border-color: #22c55e; color: #86efac; }
        .toast.error { background: #2a0a0a; border-color: #ef4444; color: #fca5a5; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            .group-panel {
                position: fixed; left: 0; top: 0; bottom: 0; z-index: 150;
                transform: translateX(-100%);
            }
            .group-panel.open { transform: translateX(0); }
            .group-panel-overlay {
                position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 140;
                display: none;
            }
            .group-panel-overlay.active { display: block; }
            .panel-toggle { display: flex; }
            .corner-info { top: 8px; right: 8px; padding: 8px 10px; gap: 6px; border-radius: 10px; }
            .corner-icon { width: 28px; height: 28px; font-size: 14px; }
            .corner-name { font-size: 0.7rem; max-width: 100px; }
            .corner-btn { width: 26px; height: 26px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- Group panel overlay (mobile) -->
    <div class="group-panel-overlay" id="groupPanelOverlay"></div>

    <!-- Panel toggle (mobile) -->
    <button class="panel-toggle" id="panelToggle" title="Group files"><i class="bx bx-menu"></i></button>

    <div class="viewer-layout">
        <!-- Left panel -->
        <div class="group-panel" id="groupPanel">
            <div class="group-panel-header">
                <div class="group-panel-icon"><i class="bx bx-collection"></i></div>
                <div class="group-panel-title" id="groupPanelTitle">Group</div>
                <span class="group-panel-count" id="groupPanelCount"></span>
            </div>
            <div class="group-panel-list" id="groupPanelList"></div>
        </div>

        <!-- Main preview -->
        <div class="preview-main">
            <div class="preview-fullscreen" id="previewArea">
                <div class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <span>Loading preview...</span>
                </div>
            </div>

            <!-- Corner info -->
            <div class="corner-info" id="cornerInfo" style="display:none;">
                <div class="corner-icon" id="cornerIcon"><i class="bx bx-file"></i></div>
                <div class="corner-details">
                    <div class="corner-name" id="cornerName">file</div>
                    <div class="corner-meta"><span id="cornerType"></span> · <span id="cornerSize"></span></div>
                </div>
                <div class="corner-actions">
                    <button class="corner-btn primary" id="btnDownload" title="Download"><i class="bx bx-download"></i></button>
                    <button class="corner-btn" id="btnOpenRaw" title="Open Raw"><i class="bx bx-open-in-new"></i></button>
                    <button class="corner-btn" id="btnCopy" title="Copy Link"><i class="bx bx-link"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // Suppress extension errors
            const origDP = Object.defineProperty;
            Object.defineProperty = function(o,p,d){try{return origDP.call(Object,o,p,d)}catch(e){if(e instanceof TypeError&&e.message.includes('Cannot redefine property'))return o;throw e}};
            window.addEventListener('error',e=>{if(e.message?.includes('Cannot redefine property')){e.preventDefault();e.stopPropagation();return false}});

            const SUPABASE_URL = "https://kdrgdnrwibuqpvikjapx.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkcmdkbnJ3aWJ1cXB2aWtqYXB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjE4ODMsImV4cCI6MjA5NjkzNzg4M30.9wEbcIDziq9xDWZQ_BF0X-p25g4SQkuCCQV-5fhDnbY";
            const STORAGE_BUCKET = "exams";
            const GROUPS_TABLE = "file_groups";
            
            let supabase;
            try{supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false}})}catch(e){}

            const $=id=>document.getElementById(id);
            const urlParams=new URLSearchParams(window.location.search);
            const fileName=urlParams.get('file')||'';
            const fileUrl=urlParams.get('url')||'';
            const groupId=urlParams.get('group')||'';
            
            let currentFile=fileName;
            let groupData=null;
            let allGroupFiles=[];

            // ==================== HELPERS ====================
            function formatSize(b){if(!b||b===0)return'0 B';const k=1024,s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]}
            function getExt(fn){return(fn||'').split('.').pop().toLowerCase()}
            function getCategory(fn){const e=getExt(fn);const d=['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','md','rtf','odt','ods','odp','json','xml'];const im=['jpg','jpeg','png','gif','svg','webp','bmp','ico'];const v=['mp4','avi','mov','mkv','webm'];const a=['mp3','wav','ogg','aac','flac'];if(d.includes(e))return e;if(im.includes(e))return'image';if(v.includes(e))return'video';if(a.includes(e))return'audio';return'other'}
            function getIcon(fn){const c=getCategory(fn);const m={'pdf':'bx bxs-file-pdf','doc':'bx bxs-file-doc','docx':'bx bxs-file-doc','xls':'bx bx-spreadsheet','xlsx':'bx bx-spreadsheet','ppt':'bx bxs-slideshow','pptx':'bx bxs-slideshow','txt':'bx bx-text','csv':'bx bx-spreadsheet','md':'bx bx-text','rtf':'bx bx-text','json':'bx bx-code','xml':'bx bx-code','image':'bx bx-image-alt','video':'bx bx-video','audio':'bx bx-music'};return m[c]||'bx bx-file-blank'}
            function typeLabel(fn){const e=getExt(fn);const t={'pdf':'PDF','doc':'Word','docx':'Word','xls':'Excel','xlsx':'Excel','ppt':'PowerPoint','pptx':'PowerPoint','txt':'Text','csv':'CSV','md':'Markdown','rtf':'Rich Text','json':'JSON','xml':'XML','jpg':'JPEG','jpeg':'JPEG','png':'PNG','gif':'GIF','svg':'SVG','webp':'WebP','mp4':'MP4','mkv':'MKV','webm':'WebM','mp3':'MP3','wav':'WAV','ogg':'OGG'};return t[e]||e.toUpperCase()+' File'}
            function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
            function showToast(m,t){const d=document.createElement('div');d.className='toast '+(t||'success');d.textContent=m;$('toastContainer').appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.3s';setTimeout(()=>d.remove(),300)},2500)}
            function getPublicUrl(fn){if(!supabase)return fileUrl||'';const{data}=supabase.storage.from(STORAGE_BUCKET).getPublicUrl(fn);return data?.publicUrl||fileUrl||''}

            // ==================== FETCH GROUP DATA ====================
            async function fetchGroupData(){
                if(!supabase||!groupId)return;
                try{
                    const{data,error}=await supabase.from(GROUPS_TABLE).select('*').eq('id',groupId).single();
                    if(error)return;
                    groupData=data;
                    allGroupFiles=data.files||[];
                    renderGroupPanel();
                }catch(e){console.warn('Group fetch error:',e);}
            }

            function renderGroupPanel(){
                if(!groupData||allGroupFiles.length===0)return;
                
                $('groupPanelTitle').textContent=groupData.title;
                $('groupPanelCount').textContent=allGroupFiles.length+' files';
                
                const list=$('groupPanelList');
                list.innerHTML=allGroupFiles.map(fn=>{
                    const cat=getCategory(fn);const ic=getIcon(fn);const sn=esc(fn);
                    const isActive=fn===currentFile;
                    return`<div class="group-panel-item${isActive?' active':''}" onclick="window.VaultView.switchFile('${sn}')" title="${sn}">
                        <div class="panel-item-icon ${cat}"><i class="${ic}"></i></div>
                        <span class="panel-item-name">${sn}</span>
                    </div>`;
                }).join('');
                
                // Show panel on desktop
                if(window.innerWidth>768){
                    $('groupPanel').style.display='flex';
                    $('panelToggle').style.display='none';
                }
            }

            function switchFile(fn){
                if(fn===currentFile)return;
                currentFile=fn;
                // Update URL without reload
                const url=getPublicUrl(fn);
                const params=new URLSearchParams({file:fn,url:url});
                if(groupId)params.set('group',groupId);
                window.history.replaceState({},'',window.location.pathname+'?'+params.toString());
                // Re-render
                updateCornerInfo();
                renderPreview();
                renderGroupPanel();
                if(window.innerWidth<=768)closePanel();
            }

            // ==================== CORNER INFO ====================
            function updateCornerInfo(){
                const cat=getCategory(currentFile);const ic=getIcon(currentFile);
                const type=typeLabel(currentFile);
                $('cornerIcon').className='corner-icon '+cat;
                $('cornerIcon').innerHTML='<i class="'+ic+'"></i>';
                $('cornerName').textContent=currentFile;$('cornerName').title=currentFile;
                $('cornerType').textContent=type;
                $('cornerSize').textContent='...'; // Size will be fetched
                $('cornerInfo').style.display='flex';
            }

            // ==================== PREVIEW ====================
            function renderPreview(){
                const url=getPublicUrl(currentFile);
                const ext=getExt(currentFile);
                const cat=getCategory(currentFile);
                const area=$('previewArea');
                
                if(['txt','md','rtf','log','json','xml','yml','yaml','ini','cfg','conf'].includes(ext)){
                    renderTextPreview(area,url,ext);
                }else if(ext==='csv'){
                    renderCsvPreview(area,url);
                }else if(['pdf','doc','docx','xls','xlsx','ppt','pptx','odt','ods','odp'].includes(ext)){
                    renderDocPreview(area,url,ext);
                }else if(['jpg','jpeg','png','gif','svg','webp','bmp','ico'].includes(ext)){
                    area.innerHTML=`<img src="${url}" alt="${esc(currentFile)}" id="previewImage" style="max-width:100%;max-height:100%;object-fit:contain;cursor:zoom-in;transition:transform 0.3s ease;" onclick="this.classList.toggle('zoomed')" onerror="this.parentElement.innerHTML='<div class=unsupported-wrap><i class=bx bx-error-circle></i><h3>Load Error</h3></div>'">`;
                }else if(['mp4','webm','ogg','mov','mkv'].includes(ext)){
                    area.innerHTML=`<video controls style="max-width:100%;max-height:100%;object-fit:contain;"><source src="${url}" type="video/${ext}"></video>`;
                }else if(['mp3','wav','ogg','aac','flac'].includes(ext)){
                    area.innerHTML=`<div class="audio-wrap"><audio controls><source src="${url}" type="audio/${ext}"></audio></div>`;
                }else{
                    area.innerHTML=`<div class="unsupported-wrap"><i class="bx bx-file-blank"></i><h3>Preview Not Available</h3><p>Use Download or Open Raw</p></div>`;
                }
            }

            async function renderTextPreview(area,url,ext){
                try{const r=await fetch(url);if(!r.ok)throw new Error('Failed');let t=await r.text();if(ext==='json'){try{t=JSON.stringify(JSON.parse(t),null,2)}catch(e){}}area.innerHTML='<div class="text-content">'+esc(t)+'</div>'}catch(e){area.innerHTML='<div class="unsupported-wrap"><i class="bx bx-error-circle"></i><h3>Error</h3></div>'}
            }

            async function renderCsvPreview(area,url){
                try{const r=await fetch(url);if(!r.ok)throw new Error('Failed');const t=await r.text();const lines=t.trim().split('\n');if(lines.length===0)throw new Error('Empty');const parse=l=>{const res=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'){if(l[i+1]==='"'){c+='"';i++}else q=false}else c+=ch}else{if(ch==='"')q=true;else if(ch===','){res.push(c.trim());c=''}else c+=ch}}res.push(c.trim());return res};const h=parse(lines[0]);const rows=lines.slice(1).map(parse);let html='<div class="csv-table-wrap"><table class="csv-table"><thead><tr>';h.forEach(hd=>html+='<th>'+esc(hd)+'</th>');html+='</tr></thead><tbody>';rows.forEach(r=>{html+='<tr>';h.forEach((_,i)=>html+='<td>'+esc(r[i]||'')+'</td>');html+='</tr>'});html+='</tbody></table></div>';area.innerHTML=html}catch(e){area.innerHTML='<div class="unsupported-wrap"><i class="bx bx-error-circle"></i><h3>CSV Error</h3></div>'}
            }

            function renderDocPreview(area,url,ext){
                if(ext==='pdf'){area.innerHTML='<iframe src="'+url+'#toolbar=0&navpanes=0" style="width:100%;height:100%;border:none;"></iframe>'}
                else{area.innerHTML='<iframe src="https://docs.google.com/viewer?url='+encodeURIComponent(url)+'&embedded=true" style="width:100%;height:100%;border:none;"></iframe>'}
            }

            // ==================== ACTIONS ====================
            async function copyUrl(){try{await navigator.clipboard.writeText(getPublicUrl(currentFile));showToast('Copied!','success')}catch(e){showToast('Failed','error')}}
            async function downloadFile(){if(!supabase)return;try{const{data,error}=await supabase.storage.from(STORAGE_BUCKET).download(currentFile);if(error)throw error;const url=URL.createObjectURL(data);const a=document.createElement('a');a.href=url;a.download=currentFile;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},100);showToast('Downloaded!','success')}catch(e){window.open(getPublicUrl(currentFile),'_blank')}}

            // ==================== PANEL TOGGLE (MOBILE) ====================
            function openPanel(){$('groupPanel').classList.add('open');$('groupPanelOverlay').classList.add('active')}
            function closePanel(){$('groupPanel').classList.remove('open');$('groupPanelOverlay').classList.remove('active')}
            
            $('panelToggle').addEventListener('click',openPanel);
            $('groupPanelOverlay').addEventListener('click',closePanel);

            // ==================== BUTTONS ====================
            $('btnDownload').addEventListener('click',downloadFile);
            $('btnOpenRaw').addEventListener('click',()=>window.open(getPublicUrl(currentFile),'_blank'));
            $('btnCopy').addEventListener('click',copyUrl);

            // ==================== KEYBOARD ====================
            document.addEventListener('keydown',e=>{
                if(e.key==='Escape'){if(window.innerWidth<=768)closePanel();else window.history.back()}
                if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();downloadFile()}
                if((e.ctrlKey||e.metaKey)&&e.key==='c'){e.preventDefault();copyUrl()}
                // Arrow keys to navigate group files
                if(groupData&&allGroupFiles.length>0){
                    const idx=allGroupFiles.indexOf(currentFile);
                    if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();if(idx>0)switchFile(allGroupFiles[idx-1])}
                    if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();if(idx<allGroupFiles.length-1)switchFile(allGroupFiles[idx+1])}
                }
            });

            // ==================== GLOBAL API ====================
            window.VaultView={switchFile,copyUrl,downloadFile};

            // ==================== INIT ====================
            async function init(){
                if(!currentFile){$('previewArea').innerHTML='<div class="unsupported-wrap"><i class="bx bx-error-circle"></i><h3>No File</h3></div>';return}
                updateCornerInfo();
                if(groupId){await fetchGroupData();}
                renderPreview();
            }
            init();
        })();
    </script>
</body>
</html>
